name: 메타 광고 자동 동기화

on:
  schedule:
    - cron: '0 21 * * 0'  # 매주 일요일 21:00 UTC = 월요일 06:00 KST
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 메타 광고 데이터 동기화
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python3 meta_sync.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto sync $(date +'%Y-%m-%d')"
          git push
