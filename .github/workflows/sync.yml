name: 메타 광고 자동 동기화

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 실행
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 메타 광고 데이터 동기화
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python3 meta_sync.py

      - name: index.html에 메타 토큰 주입
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          sed -i "s|__RT_TOKEN_PLACEHOLDER__|${META_TOKEN}|g" index.html

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --staged --quiet || git commit -m "Auto sync $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Cloudflare Pages 배포
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dashboard001
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
