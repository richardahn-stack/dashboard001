<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메타 광고 위닝소재 리포트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f4f0;--bg3:#efede8;--text:#1a1a18;--text2:#5f5e5a;--text3:#9c9a92;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--text:#e8e6de;--text2:#b4b2a9;--text3:#6e6d67;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16)}}
body{background:var(--bg3);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:0 1.25rem}
.dash{padding:.75rem 0 3rem}
.hdr{padding:1rem 0 0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:.75rem}
.hdr-title{font-size:17px;font-weight:500}
.week-tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:1rem;overflow-x:auto}
.wtab{padding:8px 18px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;white-space:nowrap}
.wtab.on{color:#185FA5;border-bottom-color:#378ADD}
.wtab:hover:not(.on){color:var(--text2)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;margin-bottom:1.25rem}
.kpi{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:8px 10px;position:relative;cursor:default}
.kpi-l{font-size:10px;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:3px}
.kpi-v{font-size:16px;font-weight:500;margin-bottom:3px}
.kpi-delta{font-size:10px;font-weight:500;padding:1px 6px;border-radius:6px;display:inline-block}
.kd-up{background:#EAF3DE;color:#27500A}.kd-dn{background:#FCEBEB;color:#791F1F}.kd-neu{background:var(--bg2);color:var(--text3)}
.tip{position:relative;display:inline-block}
.tip-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);border-radius:var(--r);padding:8px 10px;font-size:11px;line-height:1.5;width:200px;z-index:9999;pointer-events:none;white-space:normal}
.tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--text)}
.tip:hover .tip-box,.kpi:hover .tip-box{display:block}
.tip-title{font-weight:500;margin-bottom:3px;font-size:12px}
.tip-quote{font-style:italic;color:rgba(255,255,255,0.75);margin-top:2px;font-size:10px}
.tip-avg{color:rgba(255,255,255,0.6);margin-top:4px;font-size:10px;border-top:1px solid rgba(255,255,255,0.15);padding-top:4px}
.sec{margin-bottom:1.75rem}
.sec-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.sec-title{font-size:13px;font-weight:500}
.sec-sub{font-size:11px;color:var(--text3)}
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center}
.fg{display:flex;gap:4px;flex-wrap:wrap}
.fdiv{width:.5px;height:20px;background:var(--border);margin:0 4px;align-self:center}
.fbtn{padding:4px 11px;font-size:11px;font-weight:500;border-radius:14px;border:.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:3px}
.fbtn.on{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}
.fbtn:hover:not(.on){background:var(--bg3)}
.win-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.wcard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .15s}
.wcard:hover{border-color:var(--border2)}
.wcard.s5{border-color:#1D9E75}.wcard.s3{border-color:#EF9F27}
.wthumb{width:100%;padding-top:60%;position:relative;background:var(--bg2);overflow:hidden}
.wthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .2s}
.wcard:hover .wthumb img{transform:scale(1.04)}
.wno-thumb{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px;text-align:center}
.wno-name{font-size:9px;color:var(--text3);line-height:1.4;word-break:break-all}
.wno-msg{font-size:9px;color:#854F0B;font-weight:500;background:#FAEEDA;padding:2px 6px;border-radius:4px}
.wthumb-tl{position:absolute;top:5px;left:5px;right:5px;display:flex;justify-content:space-between;align-items:flex-start;gap:3px}
.wthumb-zoom{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;background:rgba(0,0,0,.3);transition:opacity .15s}
.wcard:hover .wthumb-zoom{opacity:1}
.wthumb-zoom i{color:#fff;font-size:24px}
.wbody{padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.wname{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px}
.wlabels{display:flex;gap:3px;flex-wrap:wrap}
.wroas{display:flex;align-items:baseline;gap:5px}
.wmets{display:flex;gap:4px;flex-wrap:wrap}
.wdots{display:flex;gap:2px;margin-top:1px}
.wdot{width:7px;height:7px;border-radius:50%;background:var(--bg2)}
.wdot.on{background:#1D9E75}.wdot.wn{background:#EF9F27}
.wfail{font-size:9px;color:#A32D2D;margin-top:1px}
.tcols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tcol{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.tcol-hdr{padding:9px 12px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;flex-wrap:wrap}
.trow{display:flex;align-items:stretch;border-bottom:.5px solid var(--border);cursor:pointer}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--bg2)}
.trow-th{width:60px;flex-shrink:0;background:var(--bg2);position:relative;overflow:hidden;min-height:78px}
.trow-th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.trow-te{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.trow-ov{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.trow:hover .trow-ov{opacity:1;background:rgba(0,0,0,.35)}
.trow-ov i{color:#fff;font-size:18px}
.trow-body{flex:1;min-width:0;padding:7px 10px;display:flex;flex-direction:column;gap:4px}
.trow-l1{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.trow-l2{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}
.trow-l3{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.trow-name{font-size:11px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d7w{background:var(--bg2);border-radius:var(--rl);padding:1rem 1.1rem}
.d7sum{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.d7st{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:12px;color:var(--text2)}
.d7st strong{color:var(--text);font-weight:500}
.d7cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.d7col{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.d7ch{padding:8px 11px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.d7ct{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
.d7row{display:flex;align-items:stretch;border-bottom:.5px solid var(--border);cursor:pointer}
.d7row:last-child{border-bottom:none}
.d7row:hover{background:var(--bg2)}
.d7th{width:52px;flex-shrink:0;background:var(--bg2);position:relative;overflow:hidden;min-height:68px}
.d7th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.d7te{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.d7ov{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.d7row:hover .d7ov{opacity:1;background:rgba(0,0,0,.35)}
.d7ov i{color:#fff;font-size:16px}
.d7body{flex:1;min-width:0;padding:7px 9px;display:flex;flex-direction:column;gap:4px}
.d7l1{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.d7name{font-size:11px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* 파이차트 */
.pie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.pie-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:1rem}
.pie-title{font-size:12px;font-weight:500;margin-bottom:8px;color:var(--text2)}
.pie-legend-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);margin-bottom:3px}
/* 태그 */
.mgr-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.tag{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:500;white-space:nowrap}
.tp-전환{background:#E6F1FB;color:#0C447C}.tp-트래픽{background:#EAF3DE;color:#27500A}.tp-콘조{background:#FAEEDA;color:#633806}.tp-기타{background:var(--bg2);color:var(--text3)}
.tm-영상{background:#F1EFE8;color:#444441}.tm-배너{background:#E1F5EE;color:#085041}
.tl-오딧{background:#FEF3E2;color:#92400E;border:.5px solid #F6C06A}
.tl-플랩{background:#E8F4FD;color:#0C5A8F;border:.5px solid #7EC8E3}
.tl-핑크{background:#FEE2F8;color:#831968;border:.5px solid #F0A8DC}
.tl-강민경유혜주{background:#EAF3DE;color:#27500A;border:.5px solid #C0DD97}
.tl-웨딩{background:#F3F0FF;color:#4C2F97;border:.5px solid #C4B0F5}
.tl-기타{background:var(--bg2);color:var(--text3);border:.5px solid var(--border)}
.pa-PA{background:#FFF3CD;color:#856404;border:.5px solid #FFDF6B}
.pa-자컨{background:#E8F5E9;color:#1B5E20;border:.5px solid #A5D6A7}
.td-up{background:#EAF3DE;color:#27500A}.td-dn{background:#FCEBEB;color:#791F1F}.td-new{background:#E6F1FB;color:#0C447C}
.ta-d0{background:#E6F1FB;color:#0C447C;border:.5px solid #85B7EB}.ta-d7{background:#EAF3DE;color:#3B6D11;border:.5px solid #C0DD97}
.ta-d14{background:#FAEEDA;color:#633806;border:.5px solid #FAC775}.ta-d30{background:#F1EFE8;color:#444441;border:.5px solid #D3D1C7}
.ta-old{background:var(--bg2);color:var(--text3);border:.5px solid var(--border)}
.tag-new{background:#E6F1FB;color:#0C447C;border:.5px solid #85B7EB}
.roas-arr{font-size:11px;color:var(--text3);margin:0 2px}.roas-prev{font-size:11px;color:var(--text3)}
.rv-great{color:#27500A}.rv-good{color:#0C447C}.rv-warn{color:#633806}.rv-bad{color:#A32D2D}.rv-zero{color:var(--text3)}
.sc{font-size:10px;color:var(--text3);display:inline-flex;align-items:center;gap:2px}
.mc{font-size:10px;padding:1px 6px;border-radius:4px;display:inline-flex;align-items:center}
.mc-ctr{background:#F1EFE8;color:#444441}.mc-cvr{background:#EAF3DE;color:#27500A}
.mpd-up{color:#27500A;font-weight:500}.mpd-dn{color:#A32D2D;font-weight:500}
.dtl-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);background:none;border:.5px solid var(--border2);border-radius:var(--r);padding:5px 12px;cursor:pointer;margin-bottom:8px}
.dtl-btn:hover{background:var(--bg2)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:820px}
th{font-size:10px;font-weight:500;color:var(--text3);padding:5px 7px;border-bottom:.5px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg)}
td{padding:6px 7px;border-bottom:.5px solid var(--border);vertical-align:middle;background:var(--bg)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
/* 팝업 */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem;opacity:0;transition:opacity .2s}
.mov.show{opacity:1}
.modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:840px;max-height:90vh;overflow-y:auto;transform:translateY(12px);transition:transform .2s}
.mov.show .modal{transform:translateY(0)}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.mtitle{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mclose{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px;display:flex;align-items:center;border-radius:6px}
.mclose:hover{background:var(--bg2);color:var(--text)}
.mbody{padding:1.25rem}
.mtop{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
.mimg{border-radius:var(--r);overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;min-height:180px}
.mimg img{width:100%;height:auto;object-fit:contain;display:block}
.mimg-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:12px;padding:2rem;text-align:center}
.mmeta{display:flex;flex-direction:column;gap:10px}
.mkpis{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.mkpi{background:var(--bg2);border-radius:var(--r);padding:8px 10px}
.mkpi-l{font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:3px}
.mkpi-v{font-size:15px;font-weight:500;margin-bottom:2px}
.mkpi-prev{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.wscore-detail{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.wscore-ttl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px}
.wscore-row{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;padding:4px 0;border-bottom:.5px solid var(--border);font-size:11px}
.wscore-row:last-child{border-bottom:none}
.wscore-lbl{color:var(--text2)}.wscore-thr{color:var(--text3);font-size:10px;text-align:right}.wscore-val{font-weight:500;text-align:right}.wscore-chk{font-size:13px;text-align:center;width:20px}
.wscore-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:2px;grid-column:1/-1}
.wscore-bar{height:100%;border-radius:2px;transition:width .3s}
.csec-title{font-size:13px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mtabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.mtab{padding:4px 12px;font-size:11px;font-weight:500;border-radius:14px;border:.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer}
.mtab.on{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}
.cwrap{position:relative;height:240px;background:var(--bg2);border-radius:var(--r);padding:1rem}
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl th{font-size:10px;font-weight:500;color:var(--text3);padding:5px 8px;border-bottom:.5px solid var(--border);text-align:left}
.rtbl td{padding:6px 8px;border-bottom:.5px solid var(--border)}
.rtbl tr:last-child td{border-bottom:none}
.no-data{text-align:center;padding:2rem;color:var(--text3);font-size:12px}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
@media(max-width:600px){.tcols,.d7cols{grid-template-columns:1fr}.win-grid{grid-template-columns:repeat(2,1fr)}.kpi-row{grid-template-columns:repeat(2,1fr)}.mtop{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap"><div class="dash">
<div class="hdr">
  <div class="hdr-top"><div class="hdr-title">메타 광고 위닝소재 리포트</div></div>
  <div class="week-tabs" id="weekTabs"><div style="padding:8px 18px;font-size:12px;color:var(--text3)">불러오는 중...</div></div>
</div>
<div id="mainContent"><div class="loading">데이터 불러오는 중...</div></div>
</div></div>

<!-- 팝업 -->
<div class="mov" id="mov" onclick="closeOv(event)">
  <div class="modal" id="modal">
    <div class="mhdr">
      <div class="mtitle" id="mtitle"></div>
      <button class="mclose" onclick="hideModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="mbody">
      <div class="mtop">
        <div class="mimg" id="mimg"></div>
        <div class="mmeta">
          <div style="display:flex;gap:5px;flex-wrap:wrap" id="mtags"></div>
          <div class="mkpis" id="mkpis"></div>
          <div id="mwinscore"></div>
        </div>
      </div>
      <div>
        <div class="csec-title"><i class="ti ti-chart-line" style="font-size:14px;color:#185FA5"></i>주차별 성과 트렌드</div>
        <div class="mtabs">
          <button class="mtab on" onclick="setMetric('all',this)">종합</button>
          <button class="mtab" onclick="setMetric('roas',this)">ROAS</button>
          <button class="mtab" onclick="setMetric('spend',this)">광고비</button>
          <button class="mtab" onclick="setMetric('ctr',this)">CTR</button>
          <button class="mtab" onclick="setMetric('cvr',this)">CVR</button>
          <button class="mtab" onclick="setMetric('rank',this)">순위</button>
        </div>
        <div class="cwrap" id="cwrap"><canvas id="trendChart"></canvas></div>
        <div id="rtblWrap" style="display:none;margin-top:8px"></div>
      </div>
    </div>
  </div>
</div>

<script>
const MC={'리지':'#378ADD','콜리':'#1D9E75','세레나':'#D4537E','파트너스':'#EF9F27','기타':'#888780'};
const PC={'전환':'tp-전환','트래픽':'tp-트래픽','콘조':'tp-콘조','기타':'tp-기타'};
const LAND_COLORS={'오딧':'#F97316','플랩':'#3B82F6','핑크':'#EC4899','강민경유혜주':'#8B5CF6','웨딩':'#6366F1','기타':'#9CA3AF'};
const PIE_COLORS={'전환':'#378ADD','트래픽':'#1D9E75','콘조':'#EF9F27','PA':'#F59E0B','자컨':'#10B981','-':'#9CA3AF','오딧':'#F97316','플랩':'#3B82F6','핑크':'#EC4899','강민경유혜주':'#8B5CF6','웨딩':'#6366F1'};
const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
const tc=isDark?'#B4B2A9':'#5F5E5A',gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
const CHART_COLORS=['#378ADD','#1D9E75','#D4537E','#EF9F27'];

const TIPS={
  roas:{title:'ROAS',desc:'광고비 대비 발생한 전환 매출 비중',quote:'광고비 몇 배의 돈을 벌어왔는지'},
  ctr:{title:'CTR (클릭률)',desc:'광고 노출 수 대비 클릭한 비율',quote:'이 광고를 본 사람이 클릭할 확률'},
  cvr:{title:'CVR (전환율)',desc:'광고를 클릭한 사람 중 구매한 비율',quote:'클릭한 사람이 구매할 확률'},
  cpc:{title:'CPC (클릭당 비용)',desc:'클릭 1회를 얻기 위해 쓴 광고비',quote:'낮을수록 효율적'},
  spend:{title:'광고비',desc:'집행된 총 광고 비용'},
  revenue:{title:'전환 매출',desc:'광고를 통해 발생한 총 구매 금액'},
  purchases:{title:'구매 건수',desc:'광고를 통해 발생한 구매 횟수'},
};
function tipHtml(k,extra=''){
  const t=TIPS[k];if(!t)return'';
  return`<div class="tip-box"><div class="tip-title">${t.title}</div><div>${t.desc}</div>${t.quote?`<div class="tip-quote">"${t.quote}"</div>`:''}${extra?`<div class="tip-avg">${extra}</div>`:''}</div>`;
}

const fmtS=n=>n>=10000000?'₩'+(n/10000000).toFixed(1)+'천만':n>=100000?'₩'+(n/10000).toFixed(0)+'만':n>0?'₩'+n.toLocaleString():'-';
const fmtR=p=>Math.round(p).toLocaleString()+'%';
const rvC=p=>p>=700?'rv-great':p>=400?'rv-good':p>=200?'rv-warn':p>0?'rv-bad':'rv-zero';
const ageCls=d=>d===null||d===undefined?'ta-old':d<=7?'ta-d0':d<=14?'ta-d7':d<=30?'ta-d14':d<=60?'ta-d30':'ta-old';
const pctD=(c,p)=>(!p||p===0)?null:((c-p)/Math.abs(p)*100);
function kdTag(pct,inv=false){
  if(pct===null)return'';
  const g=inv?pct<=0:pct>=0,cls=Math.abs(pct)<0.5?'kd-neu':g?'kd-up':'kd-dn';
  return`<span class="kpi-delta ${cls}">${pct>0?'+':''}${pct.toFixed(1)}%</span>`;
}
function prevDeltaHtml(cur,prev,fmt){
  if(!prev||prev===0)return'';
  const pct=((cur-prev)/Math.abs(prev)*100);
  const cls=pct>=0?'mpd-up':'mpd-dn';
  return`<span style="color:var(--text3)">전주 ${fmt(prev)}</span> <span class="${cls}">${pct>=0?'▲':'▼'}${Math.abs(pct).toFixed(1)}%</span>`;
}
function tThumb(img,ec,ov,name=''){
  const ovH=ov?`<div class="${ov}"><i class="ti ti-zoom-in" style="color:#fff;font-size:16px"></i></div>`:'';
  if(img)return`<img src="https://drive.google.com/thumbnail?id=${img}&sz=w400" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="${ec}" style="display:none"><i class="ti ti-photo" style="font-size:14px"></i></div>${ovH}`;
  if(name)return`<div class="${ec}"><div class="wno-name">${name}</div><div class="wno-msg">썸네일 업로드 필요</div></div>${ovH}`;
  return`<div class="${ec}"><i class="ti ti-photo" style="font-size:14px"></i></div>${ovH}`;
}
function labelBadges(c){
  const obj=c.objective||c.purpose||'';
  const pa=c.pa_type&&c.pa_type!=='-'?`<span class="tag pa-${c.pa_type}">${c.pa_type}</span>`:'';
  const land=c.landing&&c.landing!=='기타'?`<span class="tag tl-${c.landing}">${c.landing}</span>`:'';
  return`<span class="tag ${PC[obj]||'tp-기타'}">${obj}</span>${pa}${land}<span class="tag tm-${c.media}">${c.media}</span>`;
}

let tChart=null,curMetric='all',mKey=null,curTrendFilter={up:'spend_up',dn:'conv_dn'};
let pieCharts={};

async function loadWeeks(){
  try{const r=await fetch('data/weeks.json');weeks=await r.json();renderTabs();if(weeks.length)switchWeek(weeks[0].id);}
  catch(e){document.getElementById('weekTabs').innerHTML='<div style="padding:8px;color:#A32D2D;font-size:12px">weeks.json 로드 실패</div>';}
}
function renderTabs(){
  document.getElementById('weekTabs').innerHTML=weeks.map(w=>`<button class="wtab${w.id===curWeekId?' on':''}" onclick="switchWeek('${w.id}')">${w.label}</button>`).join('');
}
async function switchWeek(id){
  curWeekId=id;curFilter={purpose:'전체',sort:'revenue'};detailOpen=false;curTrendFilter={up:'spend_up',dn:'conv_dn'};
  renderTabs();
  if(cache[id]){renderAll(cache[id]);return;}
  document.getElementById('mainContent').innerHTML='<div class="loading">데이터 불러오는 중...</div>';
  try{const r=await fetch(`data/${id}.json`);cache[id]=await r.json();renderAll(cache[id]);}
  catch(e){document.getElementById('mainContent').innerHTML=`<div class="loading" style="color:#A32D2D">${id}.json 로드 실패</div>`;}
}

const SORT_METRIC={
  revenue:{primary:c=>fmtS(c.revenue),primaryLabel:'전환매출',secondary:c=>fmtR(c.roas_pct),secondaryLabel:'ROAS',primaryClass:c=>rvC(c.roas_pct)},
  roas:{primary:c=>fmtR(c.roas_pct),primaryLabel:'ROAS',secondary:c=>fmtS(c.revenue),secondaryLabel:'전환매출',primaryClass:c=>rvC(c.roas_pct)},
  ctr:{primary:c=>`${c.ctr}%`,primaryLabel:'CTR',secondary:c=>`₩${Math.round(c.cpc||0).toLocaleString()}`,secondaryLabel:'CPC',primaryClass:()=>'rv-good'},
  cpc:{primary:c=>`₩${Math.round(c.cpc||0).toLocaleString()}`,primaryLabel:'CPC',secondary:c=>`${c.ctr}%`,secondaryLabel:'CTR',primaryClass:()=>'rv-good'},
};

function buildWinCard(c,thr,sort='revenue'){
  const sc=c.win_score||0,flags=c.win_flags||{};
  const failKeys=Object.entries(flags).filter(([,v])=>!v).map(([k])=>({roas:'ROAS',ctr:'CTR',cvr:'CVR',cpc:'CPC',purchases:'구매'}[k]||k));
  const dots=Array.from({length:5},(_,i)=>`<div class="wdot${i<sc?(sc<=3?' wn':' on'):''}"></div>`).join('');
  const iu=c.img?`https://drive.google.com/thumbnail?id=${c.img}&sz=w400`:null;
  const dT=c.roas_delta!=null?`<span class="tag ${c.roas_delta>0?'td-up':'td-dn'}">${c.roas_delta>0?'+':''}${Math.round(c.roas_delta)}%</span>`:`<span class="tag td-new">🆕 NEW</span>`;
  const sClass=sc>=5?'s5':sc<=3?'s3':'';
  const sm=SORT_METRIC[sort]||SORT_METRIC.revenue;
  const primVal=sm.primary(c),secVal=sm.secondary(c),primCls=sm.primaryClass(c);
  let prevVal=null;
  if(sort==='revenue'&&c.prev_revenue!=null)prevVal=`전주 ${fmtS(c.prev_revenue)}`;
  else if(sort==='roas'&&c.old_roas_pct!=null)prevVal=`전주 ${fmtR(c.old_roas_pct)}`;
  else if(sort==='ctr'&&c.prev_ctr!=null)prevVal=`전주 ${c.prev_ctr}%`;
  else if(sort==='cpc'&&c.prev_cpc!=null)prevVal=`전주 ₩${Math.round(c.prev_cpc).toLocaleString()}`;
  return`<div class="wcard ${sClass}" onclick="openModal('${c.key}')">
    <div class="wthumb">${iu?`<img src="${iu}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}<div class="wno-thumb" style="display:${iu?'none':'flex'}"><div class="wno-name">${c.base_key||c.key}</div><div class="wno-msg">썸네일 업로드 필요</div></div>

      </div>
      <div class="wthumb-zoom"><i class="ti ti-zoom-in"></i></div>
    </div>
    <div class="wbody">
      <div class="wname"><span class="mgr-dot" style="background:${MC[c.mgr]}"></span>${c.base_key||c.key}</div>
      <div class="wlabels">${labelBadges(c)}</div>
      <div class="wroas"><span class="${primCls}" style="font-size:16px;font-weight:600">${primVal}</span><span style="font-size:10px;color:var(--text3)">${sm.secondaryLabel} ${secVal}</span></div>
      ${prevVal?`<div style="font-size:10px;color:var(--text3)">${prevVal}</div>`:''}
      <div class="wmets"><span class="sc"><i class="ti ti-ad" style="font-size:10px"></i>${fmtS(c.spend)}</span></div>
      <div class="wdots">${dots}</div>
      ${failKeys.length?`<div class="wfail">⚠ ${failKeys.join('·')} 미달</div>`:''}
      <div style="font-size:10px;color:var(--text3)">전주 대비 ${dT}</div>
    </div>
  </div>`;
}

function sfn(s){if(s==='revenue')return(a,b)=>b.revenue-a.revenue;if(s==='roas')return(a,b)=>b.roas_pct-a.roas_pct;if(s==='ctr')return(a,b)=>b.ctr-a.ctr;if(s==='cpc')return(a,b)=>(a.cpc||9999)-(b.cpc||9999);return(a,b)=>b.revenue-a.revenue;}
function getWinData(d,purpose,sort){
  const all=d.winning||[];
  if(purpose==='전체'){
    const conv=[...all.filter(c=>(c.objective||c.purpose)==='전환')].sort(sfn(sort)).slice(0,10);
    const remain=10-conv.length;
    const tc=[...all.filter(c=>['트래픽','콘조'].includes(c.objective||c.purpose))].sort(sfn('ctr')).slice(0,remain>0?remain:0);
    return[...conv,...tc];
  } else if(purpose==='트래픽/콘조'){
    return[...all.filter(c=>['트래픽','콘조'].includes(c.objective||c.purpose))].sort(sfn('ctr')).slice(0,10);
  }
  return[...all.filter(c=>(c.objective||c.purpose)===purpose)].sort(sfn(sort)).slice(0,10);
}

      <td><span class="tag ${PC[r.objective||r.purpose]||'tp-기타'}" style="font-size:9px">${r.objective||r.purpose}</span></td>
      <td>${r.pa_type&&r.pa_type!=='-'?`<span class="tag pa-${r.pa_type}" style="font-size:9px">${r.pa_type}</span>`:''}</td>
      <td>${r.landing&&r.landing!=='기타'?`<span class="tag tl-${r.landing}" style="font-size:9px">${r.landing}</span>`:''}</td>
      <td><span class="tag tm-${r.media}" style="font-size:9px">${r.media}</span></td>
      <td>${r.age_days!=null?`<span class="tag ${ageCls(r.age_days)}" style="font-size:9px">D+${r.age_days}</span>`:'-'}</td>
      <td>${fmtS(r.spend)}</td>
      <td><span class="${rvC(r.roas_pct)}">${r.roas_pct>0?fmtR(r.roas_pct):'-'}</span></td>
      <td style="color:var(--text3)">${r.old_roas_pct?fmtR(r.old_roas_pct):'-'}</td>
      <td>${dT}</td>
      <td>${r.purchases>0?r.purchases+'건':'-'}</td>
      <td><span class="tip" style="cursor:default">${r.ctr>0?r.ctr+'%':'-'}${tipHtml('ctr')}</span></td>
      <td><span class="tip" style="cursor:default">${r.cvr>0?r.cvr+'%':'-'}${tipHtml('cvr')}</span></td>
      <td>${ws}</td>
    </tr>`;
  }).join('');
  const tblH=`<div class="sec">
    <div class="sec-hdr"><i class="ti ti-table" style="font-size:15px;color:var(--text3)"></i><span class="sec-title">전체 소재 상세</span></div>
    <button class="dtl-btn" id="dBtn" onclick="toggleDtl()"><i class="ti ti-chevron-down" id="dIco"></i>펼쳐서 전체 보기</button>
    <div id="dWrap" style="display:none"><div class="tbl-wrap"><table><thead><tr>
      <th style="min-width:110px">소재명</th><th>목적</th><th>PA</th><th>랜딩</th><th>유형</th><th>나이</th><th>광고비</th><th>ROAS</th><th>전주</th><th>변화</th><th>구매</th><th>CTR</th><th>CVR</th><th>점수</th>
    </tr></thead><tbody>${tbH}</tbody></table></div></div>
  </div>`;

  document.getElementById('mainContent').innerHTML=kpiH+winH+trendH+d7H+pieH+tblH;
  curTrendFilter={up:'spend_up',dn:'conv_dn'};
  renderTrendSection(trends);
  setTimeout(()=>renderPieCharts(d.pie),50);
}

function setF(type,val,btn){
  curFilter[type]=val;
  document.getElementById(type==='purpose'?'purposeFilter':'sortFilter').querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(type==='purpose'&&val==='트래픽/콘조'){curFilter.sort='ctr';document.getElementById('sortFilter').querySelectorAll('.fbtn').forEach((b,i)=>b.classList.toggle('on',i===2));}
  const d=cache[curWeekId];if(!d)return;
  const thr=d.summary.winning_thresholds||{};
  const es=curFilter.purpose==='트래픽/콘조'?'ctr':curFilter.sort;
  document.getElementById('winGrid').innerHTML=getWinData(d,curFilter.purpose,curFilter.sort).map(c=>buildWinCard(c,thr,es)).join('')||'<div style="color:var(--text3);font-size:12px;padding:.5rem">해당 소재 없음</div>';
}

function toggleDtl(){
  detailOpen=!detailOpen;
  document.getElementById('dWrap').style.display=detailOpen?'block':'none';
  document.getElementById('dIco').className=detailOpen?'ti ti-chevron-up':'ti ti-chevron-down';
  document.getElementById('dBtn').childNodes[1].nodeValue=' '+(detailOpen?'접기':'펼쳐서 전체 보기');
}

// 트렌드
function mkTrow2(r,type){
  const isUp=type.endsWith('up');
  let badge='',sub='';
  if(type==='spend_up'){badge=`<span class="tag td-up">+${fmtS(r._v||0)}</span>`;sub=`광고비 ${fmtS(r.prev_spend||0)}→${fmtS(r.spend)}`;}
  else if(type==='rev_up'){badge=`<span class="tag td-up">+${fmtS(r._v||0)} (+${(r._p||0).toFixed(0)}%)</span>`;sub=`매출 ${fmtS(r.prev_revenue||0)}→${fmtS(r.revenue)}`;}
  else if(type==='cpc_eff_up'){badge=`<span class="tag td-up">CPC -${(r._drop||0).toFixed(0)}%</span>`;sub=`CPC ₩${Math.round(r.prev_cpc||0).toLocaleString()}→₩${Math.round(r.cpc||0).toLocaleString()}`;}
  else if(type==='conv_dn'){badge=`<span class="tag td-dn">ROAS -${(r._roas_drop||0).toFixed(0)}% CVR -${(r._cvr_drop||0).toFixed(0)}%</span>`;sub='전환효율 동반 하락';}
  else if(type==='cpc_eff_dn'){badge=`<span class="tag td-dn">CPC +${(r._rise||0).toFixed(0)}%</span>`;sub=`CPC ₩${Math.round(r.prev_cpc||0).toLocaleString()}→₩${Math.round(r.cpc||0).toLocaleString()}`;}
  return`<div class="trow" onclick="openModal('${r.key}')">
    <div class="trow-th">${tThumb(r.img,'trow-te','trow-ov')}</div>
    <div class="trow-body">
      <div class="trow-l1"><span class="mgr-dot" style="background:${MC[r.mgr]}"></span><span class="trow-name">${r.base_key||r.key}</span>${badge}${r.age_days!=null?`<span class="tag ${ageCls(r.age_days)}">D+${r.age_days}</span>`:''}</div>
      <div class="trow-l2"><span class="${rvC(r.roas_pct)}" style="font-size:14px;font-weight:600">${fmtR(r.roas_pct)}</span>${r.old_roas_pct?`<span class="roas-arr">←</span><span class="roas-prev">전주 ${fmtR(r.old_roas_pct)}</span>`:''}</div>
      <div class="trow-l3">${labelBadges(r)}<span class="sc"><i class="ti ti-ad" style="font-size:10px"></i>${fmtS(r.spend)}</span><span style="font-size:10px;color:var(--text3)">${sub}</span></div>
    </div>
  </div>`;
}

function renderTrendSection(trends){
  const upData=trends[curTrendFilter.up]||[];
  const dnData=trends[curTrendFilter.dn]||[];
  const el1=document.getElementById('trendUpList');
  const el2=document.getElementById('trendDnList');
  if(el1)el1.innerHTML=upData.length?upData.map(r=>mkTrow2(r,curTrendFilter.up)).join(''):'<div style="padding:1rem;font-size:12px;color:var(--text3);text-align:center">해당 소재 없음</div>';
  if(el2)el2.innerHTML=dnData.length?dnData.map(r=>mkTrow2(r,curTrendFilter.dn)).join(''):'<div style="padding:1rem;font-size:12px;color:var(--text3);text-align:center">해당 소재 없음</div>';
}

function setTrend(side,key,btn){
  curTrendFilter[side]=key;
  document.querySelectorAll(`[id^="${side}-"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const d=cache[curWeekId];if(!d)return;
  const trends=d.trends||{};
  const data=trends[key]||[];
  const elId=side==='up'?'trendUpList':'trendDnList';
  const el=document.getElementById(elId);
  if(el)el.innerHTML=data.length?data.map(r=>mkTrow2(r,key)).join(''):'<div style="padding:1rem;font-size:12px;color:var(--text3);text-align:center">해당 소재 없음</div>';
}

// 파이차트
function renderPieCharts(pie){
  if(!pie)return;
  Object.values(pieCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  pieCharts={};
  function mkPie(canvasId,legId,dataObj){
    const ctx=document.getElementById(canvasId);
    if(!ctx||!dataObj)return;
    const labels=Object.keys(dataObj).filter(k=>dataObj[k]>0);
    const values=labels.map(k=>dataObj[k]);
    const total=values.reduce((a,b)=>a+b,0);
    if(total===0)return;
    const colors=labels.map(l=>PIE_COLORS[l]||'#9CA3AF');
    pieCharts[canvasId]=new Chart(ctx,{
      type:'doughnut',
      data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'var(--bg)'}]},
      options:{responsive:true,maintainAspectRatio:true,cutout:'58%',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const pct=(c.parsed/total*100).toFixed(1);return` ${c.label}: ${fmtS(c.parsed)} (${pct}%)`;}}}}}
    });
    const leg=document.getElementById(legId);
    if(leg)leg.innerHTML=labels.map((l,i)=>`<div class="pie-legend-row"><span style="width:8px;height:8px;border-radius:50%;background:${colors[i]};flex-shrink:0"></span><span style="flex:1">${l}</span><span style="font-weight:500">${(values[i]/total*100).toFixed(1)}%</span><span style="color:var(--text3)">${fmtS(values[i])}</span></div>`).join('');
  }
  mkPie('pieObj','pieObjLeg',pie.objective);
  mkPie('piePa','piePaLeg',pie.pa_type);
  mkPie('pieLand','pieLandLeg',pie.landing);
}

// 팝업
function openModal(key){
  mKey=key;
  const wd=[];
  for(const w of weeks){if(cache[w.id]){const r=cache[w.id].all_ads?.find(r=>r.key===key);if(r)wd.push({week:w.label,weekId:w.id,...r});}}
  const cur=wd.find(r=>r.weekId===curWeekId)||wd[0];
  if(!cur)return;
  const allS=[...weeks].sort((a,b)=>a.id>b.id?1:-1);
  const fId=(()=>{for(const w of allS){if(cache[w.id]?.all_ads?.find(r=>r.key===key))return w.id;}return curWeekId;})();
  const isNew=fId===curWeekId;
  document.getElementById('mtitle').innerHTML=`<span class="mgr-dot" style="background:${MC[cur.mgr]};width:8px;height:8px"></span>${cur.base_key||cur.key}${isNew?` <span class="tag tag-new">🆕 NEW</span>`:''}`;
  const iw=document.getElementById('mimg');
  if(cur.img)iw.innerHTML=`<img src="https://drive.google.com/thumbnail?id=${cur.img}&sz=w800" style="width:100%;height:auto;object-fit:contain" onerror="this.parentElement.innerHTML='<div class=mimg-empty><i class=ti style=font-size:32px>&#xe3fc;</i><span>이미지 없음</span></div>'">`;
  else iw.innerHTML=`<div class="mimg-empty"><i class="ti ti-photo" style="font-size:32px"></i><div style="font-size:11px;word-break:break-all;text-align:center">${cur.base_key||cur.key}</div><div style="margin-top:4px;font-size:11px;color:#854F0B;font-weight:500">썸네일 업로드 필요</div></div>`;
  document.getElementById('mtags').innerHTML=labelBadges(cur)+`${cur.age_days!=null?`<span class="tag ${ageCls(cur.age_days)}">D+${cur.age_days}</span>`:''}<span style="font-size:11px;font-weight:500;color:${MC[cur.mgr]}">${cur.mgr}</span>`;
  const thr=cache[curWeekId]?.summary?.winning_thresholds||{};
  document.getElementById('mkpis').innerHTML=`
    <div class="mkpi"><div class="mkpi-l"><span>ROAS</span><i class="ti ti-info-circle" style="font-size:11px"></i>${tipHtml('roas',`이번 주 평균 ${fmtR(thr.avg_roas_pct||0)}`)}</div><div class="mkpi-v ${rvC(cur.roas_pct)}">${cur.roas_pct>0?fmtR(cur.roas_pct):'-'}</div><div class="mkpi-prev">${prevDeltaHtml(cur.roas_pct,cur.old_roas_pct,fmtR)}</div></div>
    <div class="mkpi"><div class="mkpi-l">광고비</div><div class="mkpi-v">${fmtS(cur.spend)}</div><div class="mkpi-prev">${cur.prev_spend?prevDeltaHtml(cur.spend,cur.prev_spend,fmtS):''}</div></div>
    <div class="mkpi"><div class="mkpi-l">구매</div><div class="mkpi-v">${cur.purchases>0?cur.purchases+'건':'-'}</div><div class="mkpi-prev">${cur.prev_purchases!=null?prevDeltaHtml(cur.purchases,cur.prev_purchases,v=>v+'건'):''}</div></div>
    <div class="mkpi"><div class="mkpi-l"><span>CTR / CVR</span><i class="ti ti-info-circle" style="font-size:11px"></i>${tipHtml('ctr')}</div><div class="mkpi-v" style="font-size:13px">${cur.ctr>0?cur.ctr+'%':'-'} / ${cur.cvr>0?cur.cvr+'%':'-'}</div>
      <div class="mkpi-prev" style="flex-direction:column;align-items:flex-start;gap:1px">${cur.prev_ctr?`<span>CTR ${prevDeltaHtml(cur.ctr,cur.prev_ctr,v=>v+'%')}</span>`:''} ${cur.prev_cvr?`<span>CVR ${prevDeltaHtml(cur.cvr,cur.prev_cvr,v=>v+'%')}</span>`:''}</div></div>`;
  const wsEl=document.getElementById('mwinscore');
  if(cur.win_score!=null&&cur.win_flags&&cur.win_type==='전환'){
    const fl=cur.win_flags;
    const fd=[
      {k:'roas',l:'ROAS',thr:`> ${fmtR(thr.avg_roas_pct||0)}`,val:fmtR(cur.roas_pct),pct:thr.avg_roas_pct?Math.min(100,cur.roas_pct/(thr.avg_roas_pct||1)*100):0,color:'#185FA5'},
      {k:'ctr',l:'CTR',thr:`> ${thr.avg_ctr||0}%`,val:`${cur.ctr}%`,pct:thr.avg_ctr?Math.min(100,cur.ctr/(thr.avg_ctr||1)*100):0,color:'#D4537E'},
      {k:'cvr',l:'CVR',thr:`> ${thr.avg_cvr||0}%`,val:`${cur.cvr}%`,pct:thr.avg_cvr?Math.min(100,cur.cvr/(thr.avg_cvr||1)*100):0,color:'#EF9F27'},
      {k:'cpc',l:'CPC',thr:`< ₩${Math.round(thr.avg_cpc||0).toLocaleString()}`,val:`₩${Math.round(cur.cpc||0).toLocaleString()}`,pct:thr.avg_cpc&&cur.cpc?Math.min(100,Math.max(0,(1-(cur.cpc-thr.avg_cpc)/thr.avg_cpc)*100)):50,color:'#1D9E75'},
      {k:'purchases',l:'구매',thr:`> ${thr.avg_purchases||0}건`,val:`${cur.purchases}건`,pct:thr.avg_purchases?Math.min(100,cur.purchases/(thr.avg_purchases||1)*100):0,color:'#378ADD'},
    ];
    wsEl.innerHTML=`<div class="wscore-detail"><div class="wscore-ttl">위닝 점수 ${cur.win_score}/5점 ${cur.win_score>=3?'✅ 위닝':'❌ 미달'}</div>${fd.map(f=>`<div class="wscore-row"><span class="wscore-lbl">${f.l}</span><span class="wscore-thr">기준 ${f.thr}</span><span class="wscore-val">${f.val}</span><span class="wscore-chk">${fl[f.k]?'✓':'–'}</span><div class="wscore-bar-wrap"><div class="wscore-bar" style="width:${Math.max(0,f.pct).toFixed(0)}%;background:${fl[f.k]?f.color:'#D3D1C7'}"></div></div></div>`).join('')}</div>`;
  } else wsEl.innerHTML='';
  curMetric='all';
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('on',i===0));
  renderTChart(wd);
  const ov=document.getElementById('mov');
  ov.style.display='flex';requestAnimationFrame(()=>ov.classList.add('show'));
  document.body.style.overflow='hidden';
}

function hideModal(){
  const ov=document.getElementById('mov');
  ov.classList.remove('show');
  setTimeout(()=>{ov.style.display='none';document.body.style.overflow='';},200);
  if(tChart){tChart.destroy();tChart=null;}
}
function closeOv(e){if(e.target===document.getElementById('mov'))hideModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideModal();});

function setMetric(m,btn){
  curMetric=m;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const wd=[];
  for(const w of weeks){if(cache[w.id]){const r=cache[w.id].all_ads?.find(r=>r.key===mKey);if(r)wd.push({week:w.label,weekId:w.id,...r});}}
  renderTChart(wd);
}

function renderTChart(wd){
  const cw=document.getElementById('cwrap'),rt=document.getElementById('rtblWrap');
  if(tChart){tChart.destroy();tChart=null;}
  const sorted=[...wd].sort((a,b)=>a.weekId>b.weekId?1:-1);
  const allS=[...weeks].sort((a,b)=>a.id>b.id?1:-1);
  const fId=(()=>{for(const w of allS){if(cache[w.id]?.all_ads?.find(r=>r.key===mKey))return w.id;}return sorted[0]?.weekId;})();
  const fIdx=sorted.findIndex(r=>r.weekId===fId);
  const labels=sorted.map((r,i)=>r.week+(i===fIdx?' ★':''));
  if(curMetric==='rank'){
    cw.style.display='none';rt.style.display='block';
    rt.innerHTML=`<table class="rtbl"><thead><tr><th>주차</th><th>순위</th><th>광고비</th><th>ROAS</th></tr></thead><tbody>${sorted.map((r,i)=>{const wa=cache[r.weekId]?.all_ads||[];const rank=[...wa].sort((a,b)=>b.spend-a.spend).findIndex(a=>a.key===mKey)+1;return`<tr style="${i===fIdx?'background:rgba(24,95,165,0.05)':''}"><td>${r.week}${i===fIdx?' 🆕':''}</td><td>${rank>0?rank+'위/'+wa.length+'개':'-'}</td><td>${fmtS(r.spend)}</td><td class="${rvC(r.roas_pct)}">${r.roas_pct>0?fmtR(r.roas_pct):'-'}</td></tr>`;}).join('')}</tbody></table>`;
    return;
  }
  cw.style.display='block';rt.style.display='none';
  if(sorted.length<2){cw.innerHTML=`<div class="no-data">주차 데이터가 2개 이상이어야 트렌드를 볼 수 있어요</div>`;return;}
  cw.innerHTML='<canvas id="trendChart"></canvas>';
  const ctx=document.getElementById('trendChart').getContext('2d');
  if(curMetric==='all'){
    tChart=new Chart(ctx,{type:'line',data:{labels,datasets:[
      {label:'ROAS(%)',data:sorted.map(r=>r.roas_pct||0),borderColor:CHART_COLORS[0],backgroundColor:CHART_COLORS[0]+'18',borderWidth:2,pointRadius:sorted.map((_,i)=>i===fIdx?8:4),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':CHART_COLORS[0]),pointBorderColor:'#fff',pointBorderWidth:1.5,fill:false,tension:0.3,yAxisID:'yR'},
      {label:'CTR(%)',data:sorted.map(r=>r.ctr||0),borderColor:CHART_COLORS[2],backgroundColor:CHART_COLORS[2]+'18',borderWidth:2,pointRadius:sorted.map((_,i)=>i===fIdx?8:4),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':CHART_COLORS[2]),pointBorderColor:'#fff',pointBorderWidth:1.5,fill:false,tension:0.3,yAxisID:'yC'},
      {label:'CVR(%)',data:sorted.map(r=>r.cvr||0),borderColor:CHART_COLORS[3],backgroundColor:CHART_COLORS[3]+'18',borderWidth:2,pointRadius:sorted.map((_,i)=>i===fIdx?8:4),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':CHART_COLORS[3]),pointBorderColor:'#fff',pointBorderWidth:1.5,fill:false,tension:0.3,yAxisID:'yC'},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{font:{size:11},color:tc,boxWidth:12,padding:12}}},scales:{x:{ticks:{color:(_,i)=>i===fIdx?'#0C447C':tc},grid:{color:gc}},yR:{position:'left',ticks:{color:tc,callback:v=>fmtR(v)},grid:{color:gc}},yC:{position:'right',ticks:{color:tc,callback:v=>v+'%'},grid:{display:false}}}}});
  } else {
    const mm={roas:{key:'roas_pct',fmt:fmtR,color:CHART_COLORS[0]},spend:{key:'spend',fmt:fmtS,color:CHART_COLORS[1]},ctr:{key:'ctr',fmt:v=>v+'%',color:CHART_COLORS[2]},cvr:{key:'cvr',fmt:v=>v+'%',color:CHART_COLORS[3]}};
    const m=mm[curMetric];
    tChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:m.fmt(0),data:sorted.map(r=>r[m.key]||0),borderColor:m.color,backgroundColor:m.color+'22',borderWidth:2.5,pointRadius:sorted.map((_,i)=>i===fIdx?9:5),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':m.color),pointBorderColor:'#fff',pointBorderWidth:2,fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${m.fmt(ctx.parsed.y)}`}}},scales:{x:{ticks:{color:(_,i)=>i===fIdx?'#0C447C':tc},grid:{color:gc}},y:{ticks:{color:tc,callback:v=>m.fmt(v)},grid:{color:gc}}}}});
  }
}

loadWeeks();
