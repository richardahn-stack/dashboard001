<script>

const TIPS={

  cvr:{title:'CVR (ВаёьЎўВюе)',desc:'Ж┤ЉЖ│авЦ╝ ьЂ┤вдГьЋю Вѓгвъї ВцЉ ЖхгвДцьЋю в╣ёВюе',quote:'ьЂ┤вдГьЋю ВѓгвъїВЮ┤ ЖхгвДцьЋа ьЎЋвЦа'},
  cpc:{title:'CPC (ьЂ┤вдГвІ╣ в╣ёВџЕ)',desc:'ьЂ┤вдГ 1ьџївЦ╝ Вќ╗ЖИ░ ВюёьЋ┤ ВЊ┤ Ж┤ЉЖ│ав╣ё',quote:'вѓ«ВЮёВѕўвАЮ ьџеВюеВаЂ'},
  spend:{title:'Ж┤ЉЖ│ав╣ё',desc:'ВДЉьќЅвљю В┤Ю Ж┤ЉЖ│а в╣ёВџЕ'},
  revenue:{title:'ВаёьЎў вДцВХю',desc:'Ж┤ЉЖ│авЦ╝ ьєхьЋ┤ в░юВЃЮьЋю В┤Ю ЖхгвДц ЖИѕВЋА'},
  purchases:{title:'ЖхгвДц Ж▒┤Вѕў',desc:'Ж┤ЉЖ│авЦ╝ ьєхьЋ┤ в░юВЃЮьЋю ЖхгвДц ьџЪВѕў'},
};
function tipHtml(k,extra=''){
  const t=TIPS[k];if(!t)return'';
  return`<div class="tip-box"><div class="tip-title">${t.title}</div><div>${t.desc}</div>${t.quote?`<div class="tip-quote">"${t.quote}"</div>`:''}${extra?`<div class="tip-avg">${extra}</div>`:''}</div>`;
}

const fmtS=n=>n>=10000000?'РѓЕ'+(n/10000000).toFixed(1)+'В▓ювДї':n>=100000?'РѓЕ'+(n/10000).toFixed(0)+'вДї':n>0?'РѓЕ'+n.toLocaleString():'-';
const fmtR=p=>Math.round(p).toLocaleString()+'%';
const rvC=p=>p>=700?'rv-great':p>=400?'rv-good':p>=200?'rv-warn':p>0?'rv-bad':'rv-zero';
const ageCls=d=>d===null||d===undefined?'ta-old':d<=7?'ta-d0':d<=14?'ta-d7':d<=30?'ta-d14':d<=60?'ta-d30':'ta-old';
const pctD=(c,p)=>(!p||p===0)?null:((c-p)/Math.abs(p)*100);
function kdTag(pct,inv=false){
  if(pct===null)return'';
  const g=inv?pct<=0:pct>=0,cls=Math.abs(pct)<0.5?'kd-neu':g?'kd-up':'kd-dn';
  return`<span class="kpi-delta ${cls}">${pct>0?'+':''}${pct.toFixed(1)}%</span>`;
}
function prevDeltaHtml(cur,prev,fmt){
  if(!prev||prev===0)return'';
  const pct=((cur-prev)/Math.abs(prev)*100);
  const cls=pct>=0?'mpd-up':'mpd-dn';
  return`<span style="color:var(--text3)">ВаёВБ╝ ${fmt(prev)}</span> <span class="${cls}">${pct>=0?'Рќ▓':'Рќ╝'}${Math.abs(pct).toFixed(1)}%</span>`;
}
function tThumb(img,ec,ov,name=''){

  return`<div class="${ec}"><i class="ti ti-photo" style="font-size:14px"></i></div>${ovH}`;
}
function labelBadges(c){
  const obj=c.objective||c.purpose||'';
  const pa=c.pa_type&&c.pa_type!=='-'?`<span class="tag pa-${c.pa_type}">${c.pa_type}</span>`:'';
  const land=c.landing&&c.landing!=='ЖИ░ьЃђ'?`<span class="tag tl-${c.landing}">${c.landing}</span>`:'';
  return`<span class="tag ${PC[obj]||'tp-ЖИ░ьЃђ'}">${obj}</span>${pa}${land}<span class="tag tm-${c.media}">${c.media}</span>`;

let weeks=[],curWeekId=null,curFilter={purpose:'ВаёВ▓┤',sort:'revenue'},detailOpen=false;
const cache={};
let tChart=null,curMetric='all',mKey=null,curTrendFilter={up:'spend_up',dn:'conv_dn'};
let pieCharts={};

async function loadWeeks(){
  try{const r=await fetch('data/weeks.json');weeks=await r.json();renderTabs();if(weeks.length)switchWeek(weeks[0].id);}
  catch(e){document.getElementById('weekTabs').innerHTML='<div style="padding:8px;color:#A32D2D;font-size:12px">weeks.json вАювЊю ВІцьїе</div>';}
}
function renderTabs(){
  document.getElementById('weekTabs').innerHTML=weeks.map(w=>`<button class="wtab${w.id===curWeekId?' on':''}" onclick="switchWeek('${w.id}')">${w.label}</button>`).join('');
}
async function switchWeek(id){
  curWeekId=id; curRefDate=d.ref_date||null;curFilter={purpose:'ВаёВ▓┤',sort:'revenue'};detailOpen=false;curTrendFilter={up:'spend_up',dn:'conv_dn'};

  document.getElementById('mainContent').innerHTML='<div class="loading">вЇ░ВЮ┤ьё░ вХѕвЪгВўцвіћ ВцЉ...</div>';

  catch(e){document.getElementById('mainContent').innerHTML=`<div class="loading" style="color:#A32D2D">${id}.json вАювЊю ВІцьїе</div>`;}

const SORT_METRIC={
  revenue:{primary:c=>fmtS(c.revenue),primaryLabel:'ВаёьЎўвДцВХю',secondary:c=>fmtR(c.roas_pct),secondaryLabel:'ROAS',primaryClass:c=>rvC(c.roas_pct)},
  roas:{primary:c=>fmtR(c.roas_pct),primaryLabel:'ROAS',secondary:c=>fmtS(c.revenue),secondaryLabel:'ВаёьЎўвДцВХю',primaryClass:c=>rvC(c.roas_pct)},
  ctr:{primary:c=>`${c.ctr}%`,primaryLabel:'CTR',secondary:c=>`РѓЕ${Math.round(c.cpc||0).toLocaleString()}`,secondaryLabel:'CPC',primaryClass:()=>'rv-good'},
  cpc:{primary:c=>`РѓЕ${Math.round(c.cpc||0).toLocaleString()}`,primaryLabel:'CPC',secondary:c=>`${c.ctr}%`,secondaryLabel:'CTR',primaryClass:()=>'rv-good'},
};

function buildWinCard(c,thr,sort='revenue'){
  const sc=c.win_score||0,flags=c.win_flags||{};
  const failKeys=Object.entries(flags).filter(([,v])=>!v).map(([k])=>({roas:'ROAS',ctr:'CTR',cvr:'CVR',cpc:'CPC',purchases:'ЖхгвДц'}[k]||k));
  const dots=Array.from({length:5},(_,i)=>`<div class="wdot${i<sc?(sc<=3?' wn':' on'):''}"></div>`).join('');

  const sClass=sc>=5?'s5':sc<=3?'s3':'';

      <div class="wlabels">${labelBadges(c)}</div>

}

function sfn(s){if(s==='revenue')return(a,b)=>b.revenue-a.revenue;if(s==='roas')return(a,b)=>b.roas_pct-a.roas_pct;if(s==='ctr')return(a,b)=>b.ctr-a.ctr;if(s==='cpc')return(a,b)=>(a.cpc||9999)-(b.cpc||9999);return(a,b)=>b.revenue-a.revenue;}
function getWinData(d,purpose,sort){
  const all=d.winning||[];
  if(purpose==='ВаёВ▓┤'){
    const conv=[...all.filter(c=>(c.objective||c.purpose)==='ВаёьЎў')].sort(sfn(sort)).slice(0,10);
    const remain=10-conv.length;
    const tc=[...all.filter(c=>['ьіИвъўьћй','ВйўВА░'].includes(c.objective||c.purpose))].sort(sfn('ctr')).slice(0,remain>0?remain:0);
    return[...conv,...tc];
  } else if(purpose==='ьіИвъўьћй/ВйўВА░'){
    return[...all.filter(c=>['ьіИвъўьћй','ВйўВА░'].includes(c.objective||c.purpose))].sort(sfn('ctr')).slice(0,10);
  }
  return[...all.filter(c=>(c.objective||c.purpose)===purpose)].sort(sfn(sort)).slice(0,10);
}

// ьЁїВЮ┤вИћ ВаЋваг
let tblSortCol = 'spend';
let tblSortDir = 'desc';

function sortTbl(col, thEl){
  const d = cache[curWeekId]; if(!d) return;
  if(tblSortCol === col){
    tblSortDir = tblSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    tblSortCol = col;
    // ВѕФВъљьўЋ ЖИ░в│И desc, вгИВъљьўЋ ЖИ░в│И asc
    const numCols = ['spend','roas_pct','old_roas_pct','roas_delta','purchases','ctr','cvr','win_score','age_days'];
    tblSortDir = numCols.includes(col) ? 'desc' : 'asc';
  }
  // ьЌцвЇћ ьЂ┤въўВіц ВЌЁвЇ░ВЮ┤ьіИ
  document.querySelectorAll('.th-sort').forEach(th=>{
    th.classList.remove('asc','desc');
  });
  thEl.classList.add(tblSortDir);

  const rows = [...(d.all_ads||[])];
  const numCols2 = ['spend','roas_pct','old_roas_pct','roas_delta','purchases','ctr','cvr','win_score','age_days'];
  
  rows.sort((a,b)=>{
    let av, bv;
    if(col === 'name'){
      av = fmtCreativeName(a,curRefDate).name.toLowerCase();
      bv = fmtCreativeName(b,curRefDate).name.toLowerCase();
    } else {
      av = a[col]; bv = b[col];
    }
    // null/undefined В▓ўвдг Рєњ ьЋГВЃЂ вњцвАю
    if(av == null && bv == null) return 0;
    if(av == null) return 1;
    if(bv == null) return -1;
    
    let cmp;
    if(numCols2.includes(col)){
      cmp = av - bv;
    } else {
      cmp = String(av).localeCompare(String(bv), 'ko');
    }
    return tblSortDir === 'asc' ? cmp : -cmp;
  });

  const tbody = document.getElementById('tblBody');
  if(!tbody) return;
  tbody.innerHTML = rows.map(r=>{
    const dT=r.roas_delta!=null?`<span class="tag ${r.roas_delta>0?'td-up':'td-dn'}">${r.roas_delta>0?'+':''}${Math.round(r.roas_delta)}%</span>`:'РђЊ';
    const ws=r.win_score!=null?`<span class="tag" style="background:#EAF3DE;color:#27500A">${r.win_score}Ваљ</span>`:'';
    return`<tr style="cursor:pointer" onclick="openModal('${r.key}')">
      <td style="min-width:110px"><span class="mgr-dot" style="background:${MC[r.mgr]};margin-right:4px"></span><span style="color:var(--text2);font-size:10px">${(()=>{const n=fmtCreativeName(r,curRefDate);return n.name+(n.date?` <span style="color:var(--text3)">${n.date}</span>`:'')})()} </span></td>
      <td><span class="tag ${PC[r.objective||r.purpose]||'tp-ЖИ░ьЃђ'}" style="font-size:9px">${r.objective||r.purpose}</span></td>
      <td>${r.pa_type&&r.pa_type!=='-'?`<span class="tag pa-${r.pa_type}" style="font-size:9px">${r.pa_type}</span>`:''}</td>
      <td>${r.landing&&r.landing!=='ЖИ░ьЃђ'?`<span class="tag tl-${r.landing}" style="font-size:9px">${r.landing}</span>`:''}</td>
      <td><span class="tag tm-${r.media}" style="font-size:9px">${r.media}</span></td>
      <td>${r.age_days!=null?`<span class="tag ${ageCls(r.age_days)}" style="font-size:9px">D+${r.age_days}</span>`:'-'}</td>
      <td>${fmtS(r.spend)}</td>
      <td><span class="${rvC(r.roas_pct)}">${r.roas_pct>0?fmtR(r.roas_pct):'-'}</span></td>
      <td style="color:var(--text3)">${r.old_roas_pct?fmtR(r.old_roas_pct):'-'}</td>
      <td>${dT}</td>
      <td>${r.purchases>0?r.purchases+'Ж▒┤':'-'}</td>
      <td><span class="tip" style="cursor:default">${r.ctr>0?r.ctr+'%':'-'}${tipHtml('ctr')}</span></td>
      <td><span class="tip" style="cursor:default">${r.cvr>0?r.cvr+'%':'-'}${tipHtml('cvr')}</span></td>
      <td>${ws}</td>
    </tr>`;
  }).join('');
}

// ьіИваївЊю
function getTrendInsight(r, type){
  // ВъљвЈЎ вХёВёЮ вгИЖхг
  const rd = r._roas_drop||0, cvd = r._cvr_drop||0;
  const roasUp = r.roas_pct > (r.old_roas_pct||0);
  const ctrUp = r.ctr > (r.prev_ctr||0);
  const cvrUp = r.cvr > (r.prev_cvr||0);
  if(type==='spend_up'){
    if(roasUp) return {msg:'Ж┤ЉЖ│ав╣ё ВдЮЖ░ђ + ROAS вЈЎв░ў ВЃЂВі╣ Рєњ ьЎЋВъЦ Ж│авац', cls:'up'};
    if(r.roas_pct >= (r.old_roas_pct||0)*0.95) return {msg:'Ж┤ЉЖ│ав╣ё ВдЮЖ░ђ, ьџеВюе ВюаВДђ ВцЉ', cls:'up'};
    return {msg:'Ж┤ЉЖ│ав╣ё ВдЮЖ░ђьќѕВДђвДї ьџеВюе ьЋўвЮй ВБ╝ВЮў', cls:'warn'};
  }
  if(type==='rev_up'){
    if(cvrUp) return {msg:'ВаёьЎўВюе Ж░юВёаВю╝вАю вДцВХю Вё▒ВъЦ', cls:'up'};
    if(ctrUp) return {msg:'ьЂ┤вдГвЦа Ж░юВёаВю╝вАю вДцВХю Вё▒ВъЦ', cls:'up'};
    return {msg:'ВДђВХю ьЎЋвїђвАю вДцВХю ВдЮЖ░ђ, ьџеВюе ВаљЖ▓ђ ьЋёВџћ', cls:'warn'};
  }
  if(type==='cpc_eff_up'){
    if(roasUp) return {msg:'CPC ьЋўвЮй + ROAS ВЃЂВі╣ Рєњ ьџеВюе Ж░юВёа', cls:'up'};
    return {msg:'ьЂ┤вдГ в╣ёВџЕ ВаѕЖ░љ, ВаёьЎў ьџеВюе ВХћЖ░ђ ьЎЋВЮИ', cls:'up'};
  }
  if(type==='conv_dn'){
    if(rd>=30) return {msg:'ROAS ЖИЅвЮй, ВєїВъг ьћ╝вАювЈё ьЎЋВЮИ ьЋёВџћ', cls:'dn'};
    if(cvd>=30) return {msg:'ьЂ┤вдГВЮђ вљўВДђвДї ВаёьЎў ВЋѕвље, въювћЕ ВаљЖ▓ђ', cls:'dn'};
    return {msg:'ьЂ┤вдГвЦа┬иВаёьЎўВюе вЈЎв░ў ьЋўвЮй, ВєїВъг ЖхљВ▓┤ Ж▓ђьєа', cls:'dn'};
  }
  if(type==='cpc_eff_dn'){
    if((r._rise||0)>=50) return {msg:'CPC ЖИЅвЊ▒, Ж▓йВЪЂ ВІгьЎћ вўљвіћ ьЃђЖ▓Ъ вгИВаю', cls:'dn'};
    return {msg:'ьЂ┤вдГ в╣ёВџЕ ВЃЂВі╣ ВцЉ, ВєїВъг ВаљЖ▓ђ ьЋёВџћ', cls:'warn'};
  }
  return null;
}

    bigNum=`-${(r._roas_drop||0).toFixed(0)}%`;bigCls='rv-bad';
    flowHtml=`ROAS ${r.old_roas_pct?fmtR(r.old_roas_pct):'РђЊ'} <span class="tcard-arrow">Рєњ</span> ${fmtR(r.roas_pct)} <span style="color:#E5484D;font-weight:600">(-${(r._roas_drop||0).toFixed(0)}%)</span>`;
    subLine=`CVR ${r.prev_cvr||'РђЊ'}% Рєњ ${r.cvr}% (-${(r._cvr_drop||0).toFixed(0)}%) ┬и Ж┤ЉЖ│ав╣ё ${fmtS(r.spend)}`;
  } else if(type==='cpc_eff_dn'){
    bigNum=`+${(r._rise||0).toFixed(0)}%`;bigCls='rv-bad';
    flowHtml=`CPC РѓЕ${Math.round(r.prev_cpc||0).toLocaleString()} <span class="tcard-arrow">Рєњ</span> РѓЕ${Math.round(r.cpc||0).toLocaleString()} <span style="color:#E5484D;font-weight:600">(+${(r._rise||0).toFixed(0)}%)</span>`;
    subLine=`Ж┤ЉЖ│ав╣ё ${fmtS(r.spend)} ┬и ROAS ${fmtR(r.roas_pct)}`;
  }

  return`<div class="tcard ${isUp?'up':'dn'}" onclick="openModal('${r.key}')">
    <div class="tcard-body">
      <div class="tcard-thumb">${iu?`<img src="${iu}" loading="lazy" onerror="this.style.display='none'">`:''}</div>
      <div class="tcard-info">
        <div class="tcard-name">
          <span class="mgr-dot" style="background:${MC[r.mgr]}"></span>
          <span>${r.base_key||r.key}</span>
          ${labelBadges(r)}
          ${r.age_days!=null?`<span class="tag ${ageCls(r.age_days)}" style="font-size:9px">D+${r.age_days}</span>`:''}
        </div>
        <div class="tcard-delta">
          <span class="tcard-big ${bigCls}">${bigNum}</span>
        </div>
        <div class="tcard-flow">${flowHtml}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${subLine}</div>
        ${insight?`<span class="tcard-insight ${insight.cls}"><i class="ti ti-bulb" style="font-size:10px"></i>${insight.msg}</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderTrendSection(trends){

  const el2=document.getElementById('trendDnList');
  if(el1)el1.innerHTML=upData.length?upData.map(r=>mkTrow2(r,curTrendFilter.up)).join(''):'<div style="padding:1.5rem;font-size:12px;color:var(--text3);text-align:center">ьЋ┤вІ╣ ВєїВъг ВЌєВЮї</div>';
  if(el2)el2.innerHTML=dnData.length?dnData.map(r=>mkTrow2(r,curTrendFilter.dn)).join(''):'<div style="padding:1.5rem;font-size:12px;color:var(--text3);text-align:center">ьЋ┤вІ╣ ВєїВъг ВЌєВЮї</div>';
}

function setTrend(side,key,btn){
  curTrendFilter[side]=key;

  btn.classList.add('on');

  const elId=side==='up'?'trendUpList':'trendDnList';

}

// ьїїВЮ┤В░еьіИ
function renderPieCharts(pie){
  if(!pie)return;
  Object.values(pieCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  pieCharts={};
  function mkPie(canvasId,legId,dataObj){
    const ctx=document.getElementById(canvasId);
    if(!ctx||!dataObj)return;
    const labels=Object.keys(dataObj).filter(k=>dataObj[k]>0);
    const values=labels.map(k=>dataObj[k]);
    const total=values.reduce((a,b)=>a+b,0);
    if(total===0)return;
    const colors=labels.map(l=>PIE_COLORS[l]||'#9CA3AF');
    pieCharts[canvasId]=new Chart(ctx,{
      type:'doughnut',
      data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:1.5,borderColor:'var(--bg)'}]},
      options:{responsive:false,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const pct=(c.parsed/total*100).toFixed(1);return` ${c.label}: ${fmtS(c.parsed)} (${pct}%)`;}}}}}
    });
    const leg=document.getElementById(legId);
    if(leg)leg.innerHTML=labels.map((l,i)=>{
      const pct=(values[i]/total*100).toFixed(1);
      return`<div class="pie-legend-row"><span style="width:7px;height:7px;border-radius:50%;background:${colors[i]};flex-shrink:0"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l}</span><span style="font-weight:600;color:var(--text);margin-left:4px">${pct}%</span></div>`;
    }).join('');
  }
  mkPie('pieObj','pieObjLeg',pie.objective);
  mkPie('piePa','piePaLeg',pie.pa_type);
  mkPie('pieLand','pieLandLeg',pie.landing);
}

// ьїЮВЌЁ
function openModal(key){
  mKey=key;
  const wd=[];
  for(const w of weeks){if(cache[w.id]){const r=cache[w.id].all_ads?.find(r=>r.key===key);if(r)wd.push({week:w.label,weekId:w.id,...r});}}
  const cur=wd.find(r=>r.weekId===curWeekId)||wd[0];
  if(!cur)return;
  const allS=[...weeks].sort((a,b)=>a.id>b.id?1:-1);
  const fId=(()=>{for(const w of allS){if(cache[w.id]?.all_ads?.find(r=>r.key===key))return w.id;}return curWeekId;})();
  const isNew=fId===curWeekId;
  document.getElementById('mtitle').innerHTML=`<span class="mgr-dot" style="background:${MC[cur.mgr]};width:8px;height:8px"></span>${(()=>{const n=fmtCreativeName(cur,curRefDate);return n.name+(n.date?` <span style="font-size:11px;color:var(--text3);font-weight:400">${n.date}</span>`:'')})()} ${isNew?` <span class="tag tag-new">­ЪєЋ NEW</span>`:''}`;

  const vidId = cur.video || (cur.img_type==='video' ? cur.img : null);
  if(vidId){
    const vidUrl=`https://drive.google.com/file/d/${vidId}/preview`;
    iw.innerHTML=`<div style="position:relative;width:100%;padding-top:100%;border-radius:var(--r);overflow:hidden;background:#000"><iframe src="${vidUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none" allowfullscreen allow="autoplay"></iframe></div>`;
  } else if(cur.img){
    iw.innerHTML=`<img src="https://drive.google.com/thumbnail?id=${cur.img}&sz=w1200" style="width:100%;height:auto;max-height:480px;object-fit:contain;border-radius:var(--r);background:var(--bg2);display:block" onerror="this.parentElement.innerHTML='<div style=\\'height:200px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-radius:var(--r);color:var(--text3)\\'><span>ВЮ┤в»ИВДђ ВЌєВЮї</span></div>'">`;
  } else {
    iw.innerHTML=`<div style="height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--bg2);border-radius:var(--r)"><i class="ti ti-photo" style="font-size:32px;color:var(--text3)"></i><div style="font-size:11px;color:var(--text3);text-align:center;padding:0 1rem">${cur.base_key||cur.key}</div><div style="font-size:11px;color:#854F0B;font-weight:500">ВЇИвёцВЮ╝ ВЌЁвАювЊю ьЋёВџћ</div></div>`;
  }
  document.getElementById('mtags').innerHTML=labelBadges(cur)+`${cur.age_days!=null?`<span class="tag ${ageCls(cur.age_days)}">D+${cur.age_days}</span>`:''}<span style="font-size:11px;font-weight:500;color:${MC[cur.mgr]}">${cur.mgr}</span>`;
  const thr=cache[curWeekId]?.summary?.winning_thresholds||{};
  document.getElementById('mkpis').innerHTML=`
    <div class="mkpi"><div class="mkpi-l"><span>ROAS</span><i class="ti ti-info-circle" style="font-size:11px"></i>${tipHtml('roas',`ВЮ┤в▓ѕ ВБ╝ ьЈЅЖиа ${fmtR(thr.avg_roas_pct||0)}`)}</div><div class="mkpi-v ${rvC(cur.roas_pct)}">${cur.roas_pct>0?fmtR(cur.roas_pct):'-'}</div><div class="mkpi-prev">${prevDeltaHtml(cur.roas_pct,cur.old_roas_pct,fmtR)}</div></div>
    <div class="mkpi"><div class="mkpi-l">Ж┤ЉЖ│ав╣ё</div><div class="mkpi-v">${fmtS(cur.spend)}</div><div class="mkpi-prev">${cur.prev_spend?prevDeltaHtml(cur.spend,cur.prev_spend,fmtS):''}</div></div>
    <div class="mkpi"><div class="mkpi-l">ЖхгвДц</div><div class="mkpi-v">${cur.purchases>0?cur.purchases+'Ж▒┤':'-'}</div><div class="mkpi-prev">${cur.prev_purchases!=null?prevDeltaHtml(cur.purchases,cur.prev_purchases,v=>v+'Ж▒┤'):''}</div></div>
    <div class="mkpi"><div class="mkpi-l"><span>CTR / CVR</span><i class="ti ti-info-circle" style="font-size:11px"></i>${tipHtml('ctr')}</div><div class="mkpi-v" style="font-size:13px">${cur.ctr>0?cur.ctr+'%':'-'} / ${cur.cvr>0?cur.cvr+'%':'-'}</div>
      <div class="mkpi-prev" style="flex-direction:column;align-items:flex-start;gap:1px">${cur.prev_ctr?`<span>CTR ${prevDeltaHtml(cur.ctr,cur.prev_ctr,v=>v+'%')}</span>`:''} ${cur.prev_cvr?`<span>CVR ${prevDeltaHtml(cur.cvr,cur.prev_cvr,v=>v+'%')}</span>`:''}</div></div>`;
  const wsEl=document.getElementById('mwinscore');
  if(cur.win_score!=null&&cur.win_flags&&cur.win_type==='ВаёьЎў'){
    const fl=cur.win_flags;
    const fd=[
      {k:'roas',l:'ROAS',thr:`> ${fmtR(thr.avg_roas_pct||0)}`,val:fmtR(cur.roas_pct),pct:thr.avg_roas_pct?Math.min(100,cur.roas_pct/(thr.avg_roas_pct||1)*100):0,color:'#185FA5'},
      {k:'ctr',l:'CTR',thr:`> ${thr.avg_ctr||0}%`,val:`${cur.ctr}%`,pct:thr.avg_ctr?Math.min(100,cur.ctr/(thr.avg_ctr||1)*100):0,color:'#D4537E'},
      {k:'cvr',l:'CVR',thr:`> ${thr.avg_cvr||0}%`,val:`${cur.cvr}%`,pct:thr.avg_cvr?Math.min(100,cur.cvr/(thr.avg_cvr||1)*100):0,color:'#EF9F27'},
      {k:'cpc',l:'CPC',thr:`< РѓЕ${Math.round(thr.avg_cpc||0).toLocaleString()}`,val:`РѓЕ${Math.round(cur.cpc||0).toLocaleString()}`,pct:thr.avg_cpc&&cur.cpc?Math.min(100,Math.max(0,(1-(cur.cpc-thr.avg_cpc)/thr.avg_cpc)*100)):50,color:'#1D9E75'},
      {k:'purchases',l:'ЖхгвДц',thr:`> ${thr.avg_purchases||0}Ж▒┤`,val:`${cur.purchases}Ж▒┤`,pct:thr.avg_purchases?Math.min(100,cur.purchases/(thr.avg_purchases||1)*100):0,color:'#378ADD'},
    ];
    wsEl.innerHTML=`<div class="wscore-detail"><div class="wscore-ttl">ВюёвІЮ ВаљВѕў ${cur.win_score}/5Ваљ ${cur.win_score>=3?'РюЁ ВюёвІЮ':'РЮї в»ИвІг'}</div>${fd.map(f=>`<div class="wscore-row"><span class="wscore-lbl">${f.l}</span><span class="wscore-thr">ЖИ░Вцђ ${f.thr}</span><span class="wscore-val">${f.val}</span><span class="wscore-chk">${fl[f.k]?'РюЊ':'РђЊ'}</span><div class="wscore-bar-wrap"><div class="wscore-bar" style="width:${Math.max(0,f.pct).toFixed(0)}%;background:${fl[f.k]?f.color:'#D3D1C7'}"></div></div></div>`).join('')}</div>`;
  } else wsEl.innerHTML='';
  curMetric='all';
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('on',i===0));
  renderTChart(wd);
  const ov=document.getElementById('mov');
  ov.style.display='flex';requestAnimationFrame(()=>ov.classList.add('show'));
  document.body.style.overflow='hidden';
}

function hideModal(){
  const ov=document.getElementById('mov');
  ov.classList.remove('show');
  setTimeout(()=>{ov.style.display='none';document.body.style.overflow='';},200);
  if(tChart){tChart.destroy();tChart=null;}
}
function closeOv(e){if(e.target===document.getElementById('mov'))hideModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideModal();});

function setMetric(m,btn){
  curMetric=m;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const wd=[];
  for(const w of weeks){if(cache[w.id]){const r=cache[w.id].all_ads?.find(r=>r.key===mKey);if(r)wd.push({week:w.label,weekId:w.id,...r});}}
  renderTChart(wd);
}

function renderTChart(wd){
  const cw=document.getElementById('cwrap'),rt=document.getElementById('rtblWrap');
  if(tChart){tChart.destroy();tChart=null;}
  const sorted=[...wd].sort((a,b)=>a.weekId>b.weekId?1:-1);
  const allS=[...weeks].sort((a,b)=>a.id>b.id?1:-1);
  const fId=(()=>{for(const w of allS){if(cache[w.id]?.all_ads?.find(r=>r.key===mKey))return w.id;}return sorted[0]?.weekId;})();
  const fIdx=sorted.findIndex(r=>r.weekId===fId);
  const labels=sorted.map((r,i)=>r.week+(i===fIdx?' РўЁ':''));
  if(curMetric==='rank'){
    cw.style.display='none';rt.style.display='block';
    rt.innerHTML=`<table class="rtbl"><thead><tr><th>ВБ╝В░е</th><th>ВѕюВюё</th><th>Ж┤ЉЖ│ав╣ё</th><th>ROAS</th></tr></thead><tbody>${sorted.map((r,i)=>{const wa=cache[r.weekId]?.all_ads||[];const rank=[...wa].sort((a,b)=>b.spend-a.spend).findIndex(a=>a.key===mKey)+1;return`<tr style="${i===fIdx?'background:rgba(24,95,165,0.05)':''}"><td>${r.week}${i===fIdx?' ­ЪєЋ':''}</td><td>${rank>0?rank+'Вюё/'+wa.length+'Ж░ю':'-'}</td><td>${fmtS(r.spend)}</td><td class="${rvC(r.roas_pct)}">${r.roas_pct>0?fmtR(r.roas_pct):'-'}</td></tr>`;}).join('')}</tbody></table>`;
    return;
  }
  cw.style.display='block';rt.style.display='none';
  if(sorted.length<2){cw.innerHTML=`<div class="no-data">ВБ╝В░е вЇ░ВЮ┤ьё░Ж░ђ 2Ж░ю ВЮ┤ВЃЂВЮ┤Вќ┤ВЋ╝ ьіИваївЊювЦ╝ в│╝ Вѕў ВъѕВќ┤Вџћ</div>`;return;}
  cw.innerHTML='<canvas id="trendChart"></canvas>';
  const ctx=document.getElementById('trendChart').getContext('2d');
  if(curMetric==='all'){
    tChart=new Chart(ctx,{type:'line',data:{labels,datasets:[
      {label:'ROAS(%)',data:sorted.map(r=>r.roas_pct||0),borderColor:CHART_COLORS[0],backgroundColor:CHART_COLORS[0]+'18',borderWidth:2,pointRadius:sorted.map((_,i)=>i===fIdx?8:4),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':CHART_COLORS[0]),pointBorderColor:'#fff',pointBorderWidth:1.5,fill:false,tension:0.3,yAxisID:'yR'},
      {label:'CTR(%)',data:sorted.map(r=>r.ctr||0),borderColor:CHART_COLORS[2],backgroundColor:CHART_COLORS[2]+'18',borderWidth:2,pointRadius:sorted.map((_,i)=>i===fIdx?8:4),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':CHART_COLORS[2]),pointBorderColor:'#fff',pointBorderWidth:1.5,fill:false,tension:0.3,yAxisID:'yC'},
      {label:'CVR(%)',data:sorted.map(r=>r.cvr||0),borderColor:CHART_COLORS[3],backgroundColor:CHART_COLORS[3]+'18',borderWidth:2,pointRadius:sorted.map((_,i)=>i===fIdx?8:4),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':CHART_COLORS[3]),pointBorderColor:'#fff',pointBorderWidth:1.5,fill:false,tension:0.3,yAxisID:'yC'},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{font:{size:11},color:tc,boxWidth:12,padding:12}}},scales:{x:{ticks:{color:(_,i)=>i===fIdx?'#0C447C':tc},grid:{color:gc}},yR:{position:'left',ticks:{color:tc,callback:v=>fmtR(v)},grid:{color:gc}},yC:{position:'right',ticks:{color:tc,callback:v=>v+'%'},grid:{display:false}}}}});
  } else {
    const mm={roas:{key:'roas_pct',fmt:fmtR,color:CHART_COLORS[0]},spend:{key:'spend',fmt:fmtS,color:CHART_COLORS[1]},ctr:{key:'ctr',fmt:v=>v+'%',color:CHART_COLORS[2]},cvr:{key:'cvr',fmt:v=>v+'%',color:CHART_COLORS[3]}};
    const m=mm[curMetric];
    tChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:m.fmt(0),data:sorted.map(r=>r[m.key]||0),borderColor:m.color,backgroundColor:m.color+'22',borderWidth:2.5,pointRadius:sorted.map((_,i)=>i===fIdx?9:5),pointBackgroundColor:sorted.map((_,i)=>i===fIdx?'#0C447C':m.color),pointBorderColor:'#fff',pointBorderWidth:2,fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${m.fmt(ctx.parsed.y)}`}}},scales:{x:{ticks:{color:(_,i)=>i===fIdx?'#0C447C':tc},grid:{color:gc}},y:{ticks:{color:tc,callback:v=>m.fmt(v)},grid:{color:gc}}}}});
  }
}
