<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메타 광고 위닝소재 리포트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f4f0;--bg3:#efede8;--text:#1a1a18;--text2:#5f5e5a;--text3:#9c9a92;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--text:#e8e6de;--text2:#b4b2a9;--text3:#6e6d67;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16)}}
body{background:var(--bg3);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:0 1.25rem}
.dash{padding:.75rem 0 3rem}
.hdr{padding:1rem 0 0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:.75rem}
.hdr-title{font-size:17px;font-weight:500}
.week-tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:1rem;overflow-x:auto}
.wtab{padding:8px 18px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;white-space:nowrap}
.wtab.on{color:#185FA5;border-bottom-color:#378ADD}
.wtab:hover:not(.on){color:var(--text2)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;margin-bottom:1.25rem}
.kpi{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:8px 10px;position:relative;cursor:default}
.kpi-l{font-size:10px;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:3px}
.kpi-v{font-size:16px;font-weight:500;margin-bottom:3px}
.kpi-delta{font-size:10px;font-weight:500;padding:1px 6px;border-radius:6px;display:inline-block}
.kd-up{background:#EAF3DE;color:#27500A}.kd-dn{background:#FCEBEB;color:#791F1F}.kd-neu{background:var(--bg2);color:var(--text3)}
.tip{position:relative;display:inline-block}
.tip-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);border-radius:var(--r);padding:8px 10px;font-size:11px;line-height:1.5;width:200px;z-index:9999;pointer-events:none;white-space:normal}
.tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--text)}
.tip:hover .tip-box,.kpi:hover .tip-box{display:block}
.tip-title{font-weight:500;margin-bottom:3px;font-size:12px}
.tip-quote{font-style:italic;color:rgba(255,255,255,0.75);margin-top:2px;font-size:10px}
.tip-avg{color:rgba(255,255,255,0.6);margin-top:4px;font-size:10px;border-top:1px solid rgba(255,255,255,0.15);padding-top:4px}
.sec{margin-bottom:0;padding:1.5rem 0}
.sec+.sec{border-top:1px solid var(--border)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-title{font-size:16px;font-weight:600;color:var(--text)}
.sec-hdr>.sec-icon{flex-shrink:0}
.sec-hdr>div:not(.sec-icon){flex:1;min-width:0}
.sec-sub{font-size:11px;color:var(--text3);margin-left:2px}
.perf-section{background:var(--bg2);border-radius:var(--rl);padding:1.25rem;margin-bottom:0}
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center}
.fg{display:flex;gap:4px;flex-wrap:wrap}
.fdiv{width:.5px;height:20px;background:var(--border);margin:0 4px;align-self:center}
.fbtn{padding:4px 11px;font-size:11px;font-weight:500;border-radius:14px;border:.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:3px}
.fbtn.on{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}
.fbtn:hover:not(.on){background:var(--bg3)}
.win-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.wcard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .15s}
.wcard:hover{border-color:var(--border2)}
.wcard.s5{border-color:#1D9E75}.wcard.s3{border-color:#EF9F27}
.wthumb{width:100%;padding-top:60%;position:relative;background:var(--bg2);overflow:hidden}
.wthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .2s}
.wcard:hover .wthumb img{transform:scale(1.04)}
.wno-thumb{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px;text-align:center}
.wno-name{font-size:9px;color:var(--text3);line-height:1.4;word-break:break-all}
.wno-msg{font-size:9px;color:#854F0B;font-weight:500;background:#FAEEDA;padding:2px 6px;border-radius:4px}
.wthumb-tl{position:absolute;top:5px;left:5px;right:5px;display:flex;justify-content:space-between;align-items:flex-start;gap:3px}
.wthumb-zoom{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;background:rgba(0,0,0,.3);transition:opacity .15s}
.wcard:hover .wthumb-zoom{opacity:1}
.wthumb-zoom i{color:#fff;font-size:24px}
.wbody{padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.wname{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px}
.wlabels{display:flex;gap:3px;flex-wrap:wrap}
.wroas{display:flex;align-items:baseline;gap:5px}
.wmets{display:flex;gap:4px;flex-wrap:wrap}
.wdots{display:flex;gap:2px;margin-top:1px}
.wdot{width:7px;height:7px;border-radius:50%;background:var(--bg2)}
.wdot.on{background:#1D9E75}.wdot.wn{background:#EF9F27}
.wfail{font-size:9px;color:#A32D2D;margin-top:1px}
.tcols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tcol{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.tcol-hdr{padding:9px 12px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;flex-wrap:wrap}
.trow{display:flex;align-items:stretch;border-bottom:.5px solid var(--border);cursor:pointer}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--bg2)}
.trow-th{width:60px;flex-shrink:0;background:var(--bg2);position:relative;overflow:hidden;min-height:78px}
.trow-th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.trow-te{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.trow-ov{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.trow:hover .trow-ov{opacity:1;background:rgba(0,0,0,.35)}
.trow-ov i{color:#fff;font-size:18px}
.trow-body{flex:1;min-width:0;padding:7px 10px;display:flex;flex-direction:column;gap:4px}
.trow-l1{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.trow-l2{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}
.trow-l3{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.trow-name{font-size:11px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d7w{background:var(--bg2);border-radius:var(--rl);padding:1rem 1.1rem}
.d7sum{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.d7st{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:12px;color:var(--text2)}
.d7st strong{color:var(--text);font-weight:500}
.d7cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.d7col{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.d7ch{padding:8px 11px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.d7ct{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
.d7row{display:flex;align-items:stretch;border-bottom:.5px solid var(--border);cursor:pointer}
.d7row:last-child{border-bottom:none}
.d7row:hover{background:var(--bg2)}
.d7th{width:52px;flex-shrink:0;background:var(--bg2);position:relative;overflow:hidden;min-height:68px}
.d7th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.d7te{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.d7ov{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.d7row:hover .d7ov{opacity:1;background:rgba(0,0,0,.35)}
.d7ov i{color:#fff;font-size:16px}
.d7body{flex:1;min-width:0;padding:7px 9px;display:flex;flex-direction:column;gap:4px}
.d7l1{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.d7name{font-size:11px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* 파이차트 */
.pie-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.seg-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px}
@media(max-width:600px){.seg-wrap{grid-template-columns:1fr}}
.seg-chart{display:flex;flex-direction:column;gap:10px}
.seg-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.seg-row{display:flex;flex-direction:column;gap:3px}
.seg-row-hdr{display:flex;align-items:center;justify-content:space-between}
.seg-label{font-size:11px;color:var(--text2);font-weight:500}
.seg-val{font-size:10px;color:var(--text3)}
.seg-bar-bg{height:22px;background:var(--bg2);border-radius:5px;overflow:hidden;position:relative}
.seg-bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:2px;position:relative}
.seg-bar-fill span{font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden}
.seg-bar-new{position:absolute;right:0;top:0;height:100%;background:rgba(255,255,255,0.28);border-left:1.5px solid rgba(255,255,255,0.5);display:flex;align-items:center;padding-right:5px}
.seg-bar-new span{font-size:9px;color:#fff;white-space:nowrap}
.seg-legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.seg-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.seg-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pie-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;flex-direction:column}
.pie-title{font-size:11px;font-weight:500;margin-bottom:8px;color:var(--text2)}
.pie-inner{display:flex;align-items:center;gap:10px}
.pie-legend-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);margin-bottom:2px}
@media(max-width:600px){.pie-grid{grid-template-columns:1fr}}
.tcard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
.tcard:last-child{margin-bottom:0}
.tcard:hover{border-color:var(--border2)}
.tcard.up{border-left:3px solid #1D9E75}
.tcard.dn{border-left:3px solid #E5484D}
.tcard-body{padding:10px 12px;display:flex;gap:12px;align-items:flex-start}
.tcard-thumb{width:52px;height:52px;border-radius:6px;background:var(--bg2);overflow:hidden;flex-shrink:0;position:relative}
.tcard-thumb img{width:100%;height:100%;object-fit:cover}
.tcard-info{flex:1;min-width:0}
.tcard-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tcard-delta{display:flex;align-items:baseline;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.tcard-big{font-size:20px;font-weight:700;line-height:1}
.tcard-sub{font-size:11px;color:var(--text3)}
.tcard-flow{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);margin-bottom:5px}
.tcard-arrow{font-size:11px;color:var(--text3)}
.tcard-insight{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;margin-top:2px}
.tcard-insight.up{background:#EAF3DE;color:#27500A}
.tcard-insight.dn{background:#FCEBEB;color:#791F1F}
.tcard-insight.warn{background:#FAEEDA;color:#633806}
/* 태그 */
.mgr-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.tag{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:500;white-space:nowrap}
.tp-전환{background:#E6F1FB;color:#0C447C}.tp-트래픽{background:#EAF3DE;color:#27500A}.tp-콘조{background:#FAEEDA;color:#633806}.tp-기타{background:var(--bg2);color:var(--text3)}
.tm-영상{background:#F1EFE8;color:#444441}.tm-배너{background:#E1F5EE;color:#085041}
.tl-오딧{background:#FEF3E2;color:#92400E;border:.5px solid #F6C06A}
.tl-플랩{background:#E8F4FD;color:#0C5A8F;border:.5px solid #7EC8E3}
.tl-핑크{background:#FEE2F8;color:#831968;border:.5px solid #F0A8DC}
.tl-강민경유혜주{background:#EAF3DE;color:#27500A;border:.5px solid #C0DD97}
.tl-웨딩{background:#F3F0FF;color:#4C2F97;border:.5px solid #C4B0F5}
.tl-기타{background:var(--bg2);color:var(--text3);border:.5px solid var(--border)}
.pa-PA{background:#FFF3CD;color:#856404;border:.5px solid #FFDF6B}
.pa-자컨{background:#E8F5E9;color:#1B5E20;border:.5px solid #A5D6A7}
.td-up{background:#EAF3DE;color:#27500A}.td-dn{background:#FCEBEB;color:#791F1F}.td-new{background:#E6F1FB;color:#0C447C}
.ta-d0{background:#E6F1FB;color:#0C447C;border:.5px solid #85B7EB}.ta-d7{background:#EAF3DE;color:#3B6D11;border:.5px solid #C0DD97}
.ta-d14{background:#FAEEDA;color:#633806;border:.5px solid #FAC775}.ta-d30{background:#F1EFE8;color:#444441;border:.5px solid #D3D1C7}
.ta-old{background:var(--bg2);color:var(--text3);border:.5px solid var(--border)}
.tag-new{background:#E6F1FB;color:#0C447C;border:.5px solid #85B7EB}
.roas-arr{font-size:11px;color:var(--text3);margin:0 2px}.roas-prev{font-size:11px;color:var(--text3)}
.rv-great{color:#27500A}.rv-good{color:#0C447C}.rv-warn{color:#633806}.rv-bad{color:#A32D2D}.rv-zero{color:var(--text3)}
.sc{font-size:10px;color:var(--text3);display:inline-flex;align-items:center;gap:2px}
.mc{font-size:10px;padding:1px 6px;border-radius:4px;display:inline-flex;align-items:center}
.mc-ctr{background:#F1EFE8;color:#444441}.mc-cvr{background:#EAF3DE;color:#27500A}
.mpd-up{color:#27500A;font-weight:500}.mpd-dn{color:#A32D2D;font-weight:500}
.dtl-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);background:none;border:.5px solid var(--border2);border-radius:var(--r);padding:5px 12px;cursor:pointer;margin-bottom:8px}
.dtl-btn:hover{background:var(--bg2)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:820px}
th{font-size:10px;font-weight:500;color:var(--text3);padding:5px 7px;border-bottom:.5px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg)}
td{padding:6px 7px;border-bottom:.5px solid var(--border);vertical-align:middle;background:var(--bg)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
/* 팝업 */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1200;display:none;align-items:center;justify-content:center;padding:1rem;opacity:0;transition:opacity .2s}
.mov.show{opacity:1}
.modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:840px;max-height:90vh;overflow-y:auto;transform:translateY(12px);transition:transform .2s}
.mov.show .modal{transform:translateY(0)}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.mtitle{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mclose{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px;display:flex;align-items:center;border-radius:6px}
.mclose:hover{background:var(--bg2);color:var(--text)}
.board{margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1rem}
.board-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.board-form{background:var(--bg2);border-radius:var(--r);padding:10px;margin-bottom:12px}
.board-row{display:flex;gap:6px;margin-bottom:6px}
.board-nick{width:90px;flex-shrink:0;padding:6px 8px;border:.5px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--text);outline:none}
.board-nick:focus{border-color:var(--text3)}
.board-text{flex:1;padding:6px 8px;border:.5px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--text);outline:none;resize:none;font-family:inherit;min-height:56px}
.board-text:focus{border-color:var(--text3)}
.board-submit{padding:0 14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;height:32px;align-self:flex-end;flex-shrink:0}
.board-submit:hover{opacity:0.85}
.board-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;padding-right:2px}
.board-list::-webkit-scrollbar{width:4px}
.board-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.bpost{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.bpost.reply{margin-left:20px;background:var(--bg3,var(--bg));border-left:2px solid var(--border)}
.bpost-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.bpost-nick{font-size:12px;font-weight:600;color:var(--text)}
.bpost-time{font-size:10px;color:var(--text3)}
.bpost-body{font-size:12px;color:var(--text2);line-height:1.5;word-break:break-all;white-space:pre-wrap}
.bpost-actions{margin-top:6px;display:flex;gap:8px}
.bpost-reply-btn{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0}
.bpost-reply-btn:hover{color:var(--text)}
.breply-form{margin-top:8px;display:flex;gap:5px}
.board-empty{text-align:center;padding:1.5rem;font-size:12px;color:var(--text3)}
.mbody{padding:1.25rem}
.mtop{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
.mimg{border-radius:var(--r);overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;min-height:180px}
.mimg img{width:100%;height:auto;object-fit:contain;display:block}
.mimg-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:12px;padding:2rem;text-align:center}
.mmeta{display:flex;flex-direction:column;gap:10px}
.mkpis{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.mkpi{background:var(--bg2);border-radius:var(--r);padding:8px 10px}
.mkpi-l{font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:3px}
.mkpi-v{font-size:15px;font-weight:500;margin-bottom:2px}
.mkpi-prev{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.wscore-detail{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.wscore-ttl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px}
.wscore-row{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;padding:4px 0;border-bottom:.5px solid var(--border);font-size:11px}
.wscore-row:last-child{border-bottom:none}
.wscore-lbl{color:var(--text2)}.wscore-thr{color:var(--text3);font-size:10px;text-align:right}.wscore-val{font-weight:500;text-align:right}.wscore-chk{font-size:13px;text-align:center;width:20px}
.wscore-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:2px;grid-column:1/-1}
.wscore-bar{height:100%;border-radius:2px;transition:width .3s}
.csec-title{font-size:13px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mtabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.mtab{padding:4px 12px;font-size:11px;font-weight:500;border-radius:14px;border:.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer}
.mtab.on{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}
.cwrap{position:relative;height:240px;background:var(--bg2);border-radius:var(--r);padding:1rem}
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl th{font-size:10px;font-weight:500;color:var(--text3);padding:5px 8px;border-bottom:.5px solid var(--border);text-align:left}
.rtbl td{padding:6px 8px;border-bottom:.5px solid var(--border)}
.rtbl tr:last-child td{border-bottom:none}
.no-data{text-align:center;padding:2rem;color:var(--text3);font-size:12px}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
@media(max-width:600px){.tcols,.d7cols{grid-template-columns:1fr}.win-grid{grid-template-columns:repeat(2,1fr)}.kpi-row{grid-template-columns:repeat(2,1fr)}.mtop{grid-template-columns:1fr}}

/* ── AB테스트 섹션 ── */
.ab-group{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem}
.ab-group-hd{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.ab-series-name{font-weight:700;font-size:.95rem;color:var(--text1)}
.ab-meta{font-size:.78rem;color:var(--text3);background:var(--bg2);padding:2px 10px;border-radius:20px}
.ab-cards{display:flex;gap:.75rem;overflow-x:auto;padding-bottom:.25rem}
.ab-cards::-webkit-scrollbar{height:4px}.ab-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ab-card{min-width:160px;max-width:180px;flex-shrink:0;background:var(--bg2);border:1.5px solid var(--border);border-radius:calc(var(--r) - 2px);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
.ab-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.ab-card--top{border-color:var(--accent)}
.ab-thumb{width:100%;aspect-ratio:1;background:var(--bg3);overflow:hidden}
.ab-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ab-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:1.5rem}
.ab-card-body{padding:.6rem .75rem}
.ab-card-name{font-size:.75rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ab-kpis{display:flex;flex-direction:column;gap:3px}
.ab-kpi{display:flex;justify-content:space-between;align-items:center;font-size:.72rem}
.ab-kpi-label{color:var(--text3)}
.ab-kpi-val{font-weight:600;color:var(--text1)}
.ab-kpi--out .ab-kpi-val{color:var(--accent);font-weight:700}
.ab-kpi--out .ab-kpi-label::after{content:' ↑';color:var(--accent);font-size:.65rem}
.ab-top-badge{position:absolute;top:6px;right:6px;font-size:.65rem;background:var(--accent);color:#fff;padding:2px 7px;border-radius:20px;font-weight:700}

/* ── AB 비교 팝업 ── */
.ab-mov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ab-mov.show{opacity:1;pointer-events:all}
.ab-modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:960px;max-height:92vh;overflow-y:auto;transform:translateY(14px);transition:transform .2s;display:flex;flex-direction:column}
.ab-mov.show .ab-modal{transform:translateY(0)}
.ab-sticky-hd{position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.ab-mhd{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem 1rem}
.ab-mhd-left{display:flex;flex-direction:column;gap:4px}
.ab-mhd-title{font-size:1rem;font-weight:700;color:var(--text1)}
.ab-mhd-sub{font-size:.75rem;color:var(--text3)}
.ab-mhd-close{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:1.1rem}
/* 정렬 탭 */
.ab-sort-tabs{display:flex;gap:.5rem;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.ab-sort-tab{padding:4px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:.75rem;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.ab-sort-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
/* 비교 카드 그리드 */
.ab-compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;padding:1.25rem 1.5rem}
.ab-ccard{background:var(--bg1);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
.ab-ccard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.ab-ccard.rank-1{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.ab-ccard.rank-2{border-color:#6c9eff}
.ab-ccard.rank-3{border-color:#52b788}
.ab-rank-badge{position:absolute;top:7px;left:7px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:#fff;z-index:2}
.ab-rank-badge.r1{background:var(--accent)}
.ab-rank-badge.r2{background:#6c9eff}
.ab-rank-badge.r3{background:#52b788}
.ab-cthumb{width:100%;aspect-ratio:1;overflow:hidden;background:var(--bg2)}
.ab-cthumb img{width:100%;height:100%;object-fit:cover;display:block}
.ab-cbody{padding:.7rem .85rem .85rem}
.ab-cname{font-size:.72rem;font-weight:700;color:var(--text1);margin-bottom:.55rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ab-crow{display:flex;justify-content:space-between;align-items:center;font-size:.71rem;padding:2px 0;border-bottom:1px solid var(--border)}
.ab-crow:last-child{border-bottom:none}
.ab-crow-label{color:var(--text3)}
.ab-crow-val{font-weight:600;color:var(--text1)}
.ab-crow-val.best{color:var(--accent);font-weight:800}
.ab-crow-val.worst{color:#e05c5c}


/* ── 매출 리딩 소재 섹션 ── */
.leader-grid{display:flex;flex-direction:column;gap:.6rem}
.leader-row{display:grid;grid-template-columns:28px 52px 1fr 90px 90px 80px 80px 100px;align-items:center;gap:.75rem;padding:.7rem .9rem;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:background .15s}
.leader-row:hover{background:var(--bg2)}
.leader-row.leader-row--top{border-left:3px solid var(--accent)}
.leader-rank{font-size:.8rem;font-weight:800;color:var(--text3);text-align:center}
.leader-rank.r1{color:var(--accent)}
.leader-rank.r2{color:#6c9eff}
.leader-rank.r3{color:#52b788}
.leader-thumb{width:52px;height:52px;border-radius:6px;overflow:hidden;background:var(--bg2);flex-shrink:0}
.leader-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.leader-info{min-width:0}
.leader-name{font-size:.82rem;font-weight:700;color:var(--text1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.leader-tags{display:flex;gap:4px;flex-wrap:wrap}
.leader-kpi-block{text-align:right}
.leader-kpi-main{font-size:.85rem;font-weight:700;color:var(--text1)}
.leader-kpi-sub{font-size:.7rem;color:var(--text3);margin-top:1px}
.leader-bar-block{display:flex;flex-direction:column;gap:3px;min-width:0}
.leader-bar-label{font-size:.65rem;color:var(--text3);display:flex;justify-content:space-between}
.leader-bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.leader-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.leader-bar-fill--spend{background:#6c9eff}
.leader-bar-fill--rev{background:#52b788}
@media(max-width:600px){.leader-row{grid-template-columns:24px 44px 1fr 70px;gap:.5rem}.leader-bar-block,.leader-kpi-block:nth-child(6),.leader-indicators{display:none}}

/* ── leader 지표 뱃지 ── */
.leader-indicators{display:flex;flex-direction:column;gap:3px;min-width:0}
.leader-ind-row{display:flex;gap:4px;flex-wrap:wrap}
.li-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:10px;font-size:.65rem;font-weight:700;white-space:nowrap}
.li-badge--up{background:#e8f5e9;color:#2e7d32}
.li-badge--dn{background:#fce4ec;color:#c62828}
.li-badge--neu{background:var(--bg3);color:var(--text3)}

/* ── 실시간 토큰 입력 ── */
.rt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center}
.rt-box{background:var(--bg);border-radius:var(--rl);padding:2rem;width:100%;max-width:420px;display:flex;flex-direction:column;gap:1rem}
.rt-title{font-size:1rem;font-weight:700;color:var(--text1)}
.rt-sub{font-size:.8rem;color:var(--text3);line-height:1.5}
.rt-input{width:100%;padding:.6rem .9rem;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text1);font-size:.85rem;outline:none;box-sizing:border-box}
.rt-input:focus{border-color:var(--accent)}
.rt-btn{padding:.6rem 1.2rem;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer}
.rt-status{font-size:.75rem;color:var(--text3);text-align:center}
.rt-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;background:var(--color-background-success,#e8f5e9);color:var(--color-text-success,#2e7d32);cursor:pointer;border:1px solid var(--color-border-secondary)}
</style>

</head>
<body>

<div class="wrap"><div class="dash">
<div class="hdr">

    <div class="hdr-title">메타 광고 위닝소재 리포트</div>

</div></div>

<!-- 팝업 -->

  <!-- AB 비교 팝업 -->

<script>
const MC={'리지':'#378ADD','콜리':'#1D9E75','세레나':'#D4537E','파트너스':'#EF9F27','기타':'#888780'};
const PC={'전환':'tp-전환','트래픽':'tp-트래픽','콘조':'tp-콘조','기타':'tp-기타'};
const LAND_COLORS={'오딧':'#F97316','플랩':'#3B82F6','핑크':'#EC4899','강민경유혜주':'#8B5CF6','웨딩':'#6366F1','기타':'#9CA3AF'};
const PIE_COLORS={'전환':'#378ADD','트래픽':'#1D9E75','콘조':'#EF9F27','PA':'#F59E0B','자컨':'#10B981','-':'#9CA3AF','오딧':'#F97316','플랩':'#3B82F6','핑크':'#EC4899','강민경유혜주':'#8B5CF6','웨딩':'#6366F1'};
const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
const tc=isDark?'#B4B2A9':'#5F5E5A',gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
const CHART_COLORS=['#378ADD','#1D9E75','#D4537E','#EF9F27'];

const TIPS={
  roas:{title:'ROAS',desc:'광고비 대비 발생한 전환 매출 비중',quote:'광고비 몇 배의 돈을 벌어왔는지'},
  ctr:{title:'CTR (클릭률)',desc:'광고 노출 수 대비 클릭한 비율',quote:'이 광고를 본 사람이 클릭할 확률'},
  cvr:{title:'CVR (전환율)',desc:'광고를 클릭한 사람 중 구매한 비율',quote:'클릭한 사람이 구매할 확률'},
  cpc:{title:'CPC (클릭당 비용)',desc:'클릭 1회를 얻기 위해 쓴 광고비',quote:'낮을수록 효율적'},
  spend:{title:'광고비',desc:'집행된 총 광고 비용'},
  revenue:{title:'전환 매출',desc:'광고를 통해 발생한 총 구매 금액'},
  purchases:{title:'구매 건수',desc:'광고를 통해 발생한 구매 횟수'},
};
function tipHtml(k,extra=''){
  const t=TIPS[k];if(!t)return'';
  return`<div class="tip-box"><div class="tip-title">${t.title}</div><div>${t.desc}</div>${t.quote?`<div class="tip-quote">"${t.quote}"</div>`:''}${extra?`<div class="tip-avg">${extra}</div>`:''}</div>`;
}

const fmtS=n=>n>=10000000?'₩'+(n/10000000).toFixed(1)+'천만':n>=100000?'₩'+(n/10000).toFixed(0)+'만':n>0?'₩'+n.toLocaleString():'-';
const fmtR=p=>Math.round(p).toLocaleString()+'%';
const fmtW=n=>n>0?'₩'+n.toLocaleString():'-';
const rvC=p=>p>=700?'rv-great':p>=400?'rv-good':p>=200?'rv-warn':p>0?'rv-bad':'rv-zero';
const ageCls=d=>d===null||d===undefined?'ta-old':d<=7?'ta-d0':d<=14?'ta-d7':d<=30?'ta-d14':d<=60?'ta-d30':'ta-old';
const pctD=(c,p)=>(!p||p===0)?null:((c-p)/Math.abs(p)*100);
function kdTag(pct,inv=false){
  if(pct===null)return'';
  const g=inv?pct<=0:pct>=0,cls=Math.abs(pct)<0.5?'kd-neu':g?'kd-up':'kd-dn';
  return`<span class="kpi-delta ${cls}">${pct>0?'+':''}${pct.toFixed(1)}%</span>`;
}
function prevDeltaHtml(cur,prev,fmt){
  if(!prev||prev===0)return'';
  const pct=((cur-prev)/Math.abs(prev)*100);
  const cls=pct>=0?'mpd-up':'mpd-dn';
  return`<span style="color:var(--text3)">전주 ${fmt(prev)}</span> <span class="${cls}">${pct>=0?'▲':'▼'}${Math.abs(pct).toFixed(1)}%</span>`;
}
// img → 실제 src (메타 URL 그대로, 드라이브 ID는 드라이브 URL 변환)
function imgSrc(img, sz='w400'){
  if(!img) return null;
  if(img.startsWith('http')||img.startsWith('//')) return img;
  return `https://drive.google.com/thumbnail?id=${img}&sz=${sz}`;
}

// 소재 썸네일 HTML 생성 (카드용)
function thumbHtml(row, containerCls, overlayCls){
  const src = imgSrc(row.img, 'w400');
  const ov  = overlayCls ? `<div class="${overlayCls}"><i class="ti ti-zoom-in" style="color:#fff;font-size:16px"></i></div>` : '';
  if(src){
    return `<img src="${src}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="${containerCls}" style="display:none"></div>${ov}`;
  }
  if(row.video){
    return `<div class="${containerCls}" style="flex-direction:column;gap:4px">
              <i class="ti ti-player-play" style="font-size:20px;color:var(--text3)"></i>
              <div style="font-size:9px;color:var(--text3)">영상</div>
            </div>${ov}`;
  }

    // 실시간 탭은 loadRealtimeWeek에서 처리하므로 여기선 과거 JSON만

  // ── 카페24 판매 데이터 로드 (오딧 라인×색상 매트릭스) ──

  // ── 실시간 데이터 로드 ──

function renderTabs(){
  const tabsEl = document.getElementById('weekTabs');
  tabsEl.innerHTML = '';
  weeks.forEach(w=>{
    const btn = document.createElement('button');

      btn.style.borderBottom = '2px solid #E24B4A';

    }

  }
  document.getElementById('mainContent').innerHTML='<div class="loading">데이터 불러오는 중...</div>';
  try{
    const r=await fetch(`data/${id}.json`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    cache[id]=await r.json();
    curRefDate=cache[id].ref_date||null;
    if(cache[id]._placeholder){
      document.getElementById('mainContent').innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:1rem;color:var(--color-text-secondary)">'

        +'<div style="font-size:.75rem;color:var(--color-text-tertiary)">다음 Actions 실행 시 데이터가 채워져요</div>'
        +'</div>';
      return;
    }
  } catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="loading" style="color:#A32D2D">${id}.json 로드 실패: ${e.message}</div>`;
    return;
  }
  try{
    renderAll(cache[id]);
  } catch(e){
    console.error('[renderAll 오류]', e.message, e.stack);
    document.getElementById('mainContent').innerHTML=`<div class="loading" style="color:#A32D2D">렌더링 오류: ${e.message}</div>`;
  }
}

  const sClass=sc>=5?'s5':sc<=3?'s3':'';

  else if(sort==='roas'&&c.old_roas_pct!=null)prevVal=`전주 ${fmtR(c.old_roas_pct)}`;
  else if(sort==='ctr'&&c.prev_ctr!=null)prevVal=`전주 ${c.prev_ctr}%`;
  else if(sort==='cpc'&&c.prev_cpc!=null)prevVal=`전주 ₩${Math.round(c.prev_cpc).toLocaleString()}`;

        ${(()=>{
          let delta=null,isGood=true;
          if(sort==='revenue'&&c.prev_revenue>0){delta=(c.revenue-c.prev_revenue)/c.prev_revenue*100;isGood=delta>=0;}
          else if(sort==='roas'&&c.roas_delta!=null){delta=c.roas_delta;isGood=delta>=0;}
          else if(sort==='ctr'&&c.prev_ctr>0){delta=(c.ctr-c.prev_ctr)/c.prev_ctr*100;isGood=delta>=0;}
          else if(sort==='cpc'&&c.prev_cpc>0){delta=(c.prev_cpc-c.cpc)/c.prev_cpc*100;isGood=delta>=0;}
          if(delta==null)return c.is_new?'<span class="tag" style="font-size:9px;background:#E6F1FB;color:#0C447C;font-weight:600">NEW</span>':'';
          const sign=delta>=0?'+':'';
          const bg=isGood?'#EAF3DE':'#FCEBEB';
          const col=isGood?'#27500A':'#791F1F';
          return '<span class="tag" style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;background:'+bg+';color:'+col+'">'+sign+Math.round(delta)+'%</span>';
        })()}
      </div>
      <div class="wthumb-zoom"><i class="ti ti-zoom-in"></i></div>
    </div>
    <div class="wbody">

      ${prevVal?`<div style="font-size:10px;color:var(--text3)">${prevVal}</div>`:''}
      <div class="wmets"><span class="sc"><i class="ti ti-ad" style="font-size:10px"></i>${fmtS(c.spend)}</span></div>
      <div class="wdots">${dots}</div>
      ${failKeys.length?`<div class="wfail">⚠ ${failKeys.join('·')} 미달</div>`:''}
    </div>
  </div>`;
}

function sfn(s){if(s==='spend')return(a,b)=>b.spend-a.spend;if(s==='revenue')return(a,b)=>b.revenue-a.revenue;if(s==='roas')return(a,b)=>b.roas_pct-a.roas_pct;if(s==='ctr')return(a,b)=>b.ctr-a.ctr;if(s==='cpc')return(a,b)=>(a.cpc||9999)-(b.cpc||9999);return(a,b)=>b.revenue-a.revenue;}
function getWinData(d,purpose,sort){
  const all=d.winning||[];
  if(purpose==='전체'){
    const conv=[...all.filter(c=>(c.objective||c.purpose)==='전환')].sort(sfn(sort)).slice(0,10);
    const remain=10-conv.length;
    const tc=[...all.filter(c=>['트래픽','콘조'].includes(c.objective||c.purpose))].sort(sfn('ctr')).slice(0,remain>0?remain:0);
    return[...conv,...tc];
  } else if(purpose==='트래픽/콘조'){
    return[...all.filter(c=>['트래픽','콘조'].includes(c.objective||c.purpose))].sort(sfn('ctr')).slice(0,10);
  }
  return[...all.filter(c=>(c.objective||c.purpose)===purpose)].sort(sfn(sort)).slice(0,10);
}

// ── 카페24 실판매 매트릭스 (오딧 5개 라인 × 8개 색상, 전주 대비) ──
function buildSalesSection(){
  if(!salesData || !salesData.matrix) return '';
  const wid = curWeekId;
  const lines  = salesData.lines  || [];
  const colors = salesData.colors || [];
  const cur = salesData.matrix[wid];

  const hdr = `<div class="sec"><div class="sec-hdr">
    <div class="sec-icon" style="background:#E8F0FE"><i class="ti ti-shopping-cart" style="font-size:15px;color:#1A56B0"></i></div>
    <div><span class="sec-title">오딧 실판매 (카페24)</span>
    <div class="sec-sub">라인 × 색상 판매 수량 · 전주 대비</div></div></div>`;

  if(!cur){
    const msg = wid==='RT-LIVE'
      ? '이번 주 실판매는 주 마감 후 집계돼요.'
      : '이 주차의 판매 데이터가 아직 없어요.';
    return hdr + `<div style="color:var(--text3);font-size:12px;padding:.5rem">${msg}</div></div>`;
  }

  // 전주(더 과거) 주차 찾기
  const idx = weeks.findIndex(w=>w.id===wid);
  const prevW = idx>=0 ? weeks.slice(idx+1).find(w=>w.id!=='RT-LIVE') : null;
  const prev = prevW ? salesData.matrix[prevW.id] : null;

  const dChip = (c, p)=>{
    if(p==null) return '';
    if(p===0) return c>0 ? '<span style="color:#1D9E75;font-size:9px;font-weight:600">NEW</span>' : '';
    if(c===p) return '<span style="color:var(--text3);font-size:9px">0%</span>';
    const d=(c-p)/p*100, up=d>0;
    return `<span style="color:${up?'#1D9E75':'#E5484D'};font-size:9px;font-weight:600">${up?'▲':'▼'}${Math.abs(d).toFixed(0)}%</span>`;
  };
  const cell = (c, p)=>`<td style="text-align:center;padding:5px 6px;border-bottom:1px solid var(--bd)">
    <div style="font-weight:${c>0?'600':'400'};color:${c>0?'var(--text1)':'var(--text3)'}">${c}</div>${dChip(c,p)}</td>`;

  // 색상 컬럼 합계(전체 라인)
  const colTot = c=>lines.reduce((s,ln)=>s+(cur[ln]?.[c]||0),0);
  const colTotP = c=>prev?lines.reduce((s,ln)=>s+(prev[ln]?.[c]||0),0):null;

  let body = '';
  lines.forEach(ln=>{
    const rowTot = colors.reduce((s,c)=>s+(cur[ln]?.[c]||0),0);
    const rowTotP = prev?colors.reduce((s,c)=>s+(prev[ln]?.[c]||0),0):null;
    body += `<tr><td style="padding:5px 8px;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--bd)">${ln}</td>`
      + colors.map(c=>cell(cur[ln]?.[c]||0, prev?(prev[ln]?.[c]??null):null)).join('')
      + `<td style="text-align:center;padding:5px 8px;font-weight:700;background:var(--bg2);border-bottom:1px solid var(--bd)"><div>${rowTot}</div>${dChip(rowTot,rowTotP)}</td></tr>`;
  });
  // 합계 행
  const grand = lines.reduce((s,ln)=>s+colors.reduce((a,c)=>a+(cur[ln]?.[c]||0),0),0);
  const grandP = prev?lines.reduce((s,ln)=>s+colors.reduce((a,c)=>a+(prev[ln]?.[c]||0),0),0):null;
  body += `<tr style="background:var(--bg2)"><td style="padding:5px 8px;font-weight:700">합계</td>`
    + colors.map(c=>`<td style="text-align:center;padding:5px 6px;font-weight:700"><div>${colTot(c)}</div>${dChip(colTot(c),colTotP(c))}</td>`).join('')
    + `<td style="text-align:center;padding:5px 8px;font-weight:800"><div>${grand}</div>${dChip(grand,grandP)}</td></tr>`;

  const head = `<tr><th style="text-align:left;padding:6px 8px;font-size:11px;color:var(--text3)">라인＼색상</th>`
    + colors.map(c=>`<th style="padding:6px 6px;font-size:11px;color:var(--text3);white-space:nowrap">${c}</th>`).join('')

function renderAll(d){

        </div>

      </div>
    </div>

  // 섹션3: D+7

  const dw=d.d7_win||[],dl=d.d7_lose||[];
  const d7H=`<div class="sec">
    <div class="sec-hdr">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="sec-icon" style="background:#E6F1FB"><i class="ti ti-test-pipe" style="font-size:15px;color:#185FA5"></i></div>

      </div>
    </div>
    <div class="d7w">
      <div class="d7sum" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">

          <div class="d7st">7일 이내 <strong>${dw.length+dl.length}개</strong></div>
          <div class="d7st">위닝 광고비 <strong>${fmtW(dw.reduce((s,r)=>s+r.spend,0))}</strong></div>

  // 섹션4: 광고비 구성 (파이차트 + 신규 vs 기존 이중 막대 + 툴팁)
  const pyAds = d.all_ads||[];
  const tc_ads  = pyAds.filter(function(r){return r.objective==='트래픽'||r.objective==='콘조';});
  const ptr_ads = pyAds.filter(function(r){return r.mgr==='파트너스';});
  const std_ads = pyAds.filter(function(r){return r.objective==='전환' && r.mgr!=='파트너스';});

  function isNew(r){return r.is_new===true;}
  function sumSpend(arr){return arr.reduce(function(s,r){return s+(r.spend||0);},0);}
  function pct2(a,b){return b>0?Math.round(a/b*100):0;}
  function fmtSp(v){
    if(v>=10000000) return Math.round(v/10000000)+'천만';
    if(v>=10000) return Math.round(v/10000)+'만';
    return v.toLocaleString();
  }

  var typeNames  = ['콘조/트래픽','파트너스','상시전환'];
  var typeColors = ['#5EA3D0','#F0A04B','#6DB87A'];
  var typeDark   = ['#185FA5','#854F0B','#27500A'];
  var typeLight  = ['#B5D4F4','#FAC775','#C0DD97'];
  var typeLText  = ['#0C447C','#633806','#27500A'];
  var typeAds    = [tc_ads, ptr_ads, std_ads];

  var spendVals  = typeAds.map(sumSpend);
  var cntVals    = typeAds.map(function(a){return a.length;});
  var newCntVals = typeAds.map(function(a){return a.filter(isNew).length;});
  var newSpVals  = typeAds.map(function(a){return sumSpend(a.filter(isNew));});
  var totalSpend = spendVals.reduce(function(s,v){return s+v;},0)||1;
  var totalCnt   = cntVals.reduce(function(s,v){return s+v;},0)||1;
  var spendPcts  = spendVals.map(function(v){return pct2(v,totalSpend);});
  var cntPcts    = cntVals.map(function(v){return pct2(v,totalCnt);});

  // 파이차트 SVG (인터랙티브 - canvas 대신 SVG로 직접 구현)
  function mkInteractivePie(chartId, ttId, values, total, sliceData){
    var cx=45,cy=45,r=36,ir=22;
    var paths='',s=-Math.PI/2;
    sliceData.forEach(function(sl,i){
      var a=sl.pct/100*Math.PI*2,e=s+a;
      var x1=(cx+r*Math.cos(s)).toFixed(2),y1=(cy+r*Math.sin(s)).toFixed(2);
      var x2=(cx+r*Math.cos(e)).toFixed(2),y2=(cy+r*Math.sin(e)).toFixed(2);
      var lg=a>Math.PI?1:0;
      paths+='<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' Z"'+
        ' fill="'+sl.color+'"'+
        ' data-i="'+i+'"'+
        ' style="cursor:pointer;transition:opacity .15s"'+
        ' onmouseenter="showPieTT(\''+ttId+'\','+i+')"'+
        ' onmouseleave="hideTT(\''+ttId+'\')"'+
        '/>';
      s=e;
    });
    return '<svg id="'+chartId+'" viewBox="0 0 90 90" width="90" height="90" style="overflow:visible">'+
      paths+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+ir+'" fill="var(--color-background-primary)" style="pointer-events:none"/>'+
    '</svg>';
  }

  // 범례 HTML
  function mkPieLeg(pcts){

      'border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 11px;'+

  // 이중 막대 한 타입

    function mkSeg(w, bg, textC, elId, titleTxt, r1Label, r1Val, r2Label, r2Val){

          ' onmouseenter="showBarTT(\''+elId+'\')"'+

        '><span style="font-size:10px;font-weight:500;color:'+textC+';white-space:nowrap;overflow:hidden">'+inner+'</span></div>'+

    }

    var newCntSeg = mkSeg(newCntP, typeDark[i], '#fff', 'bt'+i+'nc',
      '신규 소재', '소재 수', newCntVals[i]+'개 ('+newCntP+'%)',
      '광고비', '₩'+fmtSp(newSpVals[i])+'원');
    var oldCntSeg = mkSeg(oldCntP, typeLight[i], typeLText[i], 'bt'+i+'oc',
      '기존 소재', '소재 수', (cntVals[i]-newCntVals[i])+'개 ('+oldCntP+'%)',

    var newSpSeg = mkSeg(newSpP, typeDark[i], '#fff', 'bt'+i+'ns',
      '신규 소재', '광고비', '₩'+fmtSp(newSpVals[i])+'원 ('+newSpP+'%)',
      '소재 수', newCntVals[i]+'개');
    var oldSpSeg = mkSeg(oldSpP, typeLight[i], typeLText[i], 'bt'+i+'os',
      '기존 소재', '광고비', '₩'+fmtSp(spendVals[i]-newSpVals[i])+'원 ('+oldSpP+'%)',
      '소재 수', (cntVals[i]-newCntVals[i])+'개');

    return '<div style="margin-bottom:14px">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">'+

          '</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:7px">'+
          '<div style="font-size:10px;color:var(--color-text-tertiary);width:36px;text-align:right;flex-shrink:0">광고비</div>'+

            newSpSeg+oldSpSeg+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

/* ───── 매출 리딩 소재 섹션 ───── */
function buildLeaderSection(d){
  const all  = d.all_ads || [];
  const conv = all.filter(r=>r.objective==='전환' && (r.spend||0)>0);
  const tSpend = all.reduce((s,r)=>s+(r.spend||0),0);
  const tRev   = all.reduce((s,r)=>s+(r.revenue||0),0);
  const top = [...conv].sort((a,b)=>b.spend-a.spend).slice(0,7);

  // ── 연속 등장 뱃지: JSON에 미리 계산된 leader_badges 사용 ──
  const leaderBadges = d.leader_badges || {};
  function calcBadge(baseKey){
    return leaderBadges[baseKey] || {type:'new'};
  }

  const topSpend = top.reduce((s,r)=>s+(r.spend||0),0);
  const topRev   = top.reduce((s,r)=>s+(r.revenue||0),0);
  const spPct = tSpend>0 ? Math.round(topSpend/tSpend*100) : 0;
  const rvPct = tRev>0   ? Math.round(topRev/tRev*100)   : 0;
  const maxSpend = (top[0] && top[0].spend) ? top[0].spend : 1;
  const maxRev   = Math.max(...top.map(r=>r.revenue||0)) || 1;

  const rows = top.map((r,i)=>{
    const rank  = i+1;
    const rCls  = rank<=3 ? 'r'+rank : '';
    const spPortion = tSpend>0 ? (r.spend/tSpend*100).toFixed(1) : '0';
    const rvPortion = tRev>0   ? ((r.revenue||0)/tRev*100).toFixed(1) : '0';
    const spBarW = Math.round(r.spend/maxSpend*100);
    const rvBarW = tRev>0 ? Math.round((r.revenue||0)/maxRev*100) : 0;
    const th = r.img
      ? '<img src="'+imgSrc(r.img,'w200')+'" loading="lazy" onerror="this.style.display=&#39;none&#39;">'
      : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:1.2rem">&#9654;</div>';


    // 해당 소재 지난주 성과 대비 뱃지
    const prevRoas = (r.prev_spend && r.prev_revenue)
      ? Math.round(r.prev_revenue / r.prev_spend * 100) : 0;
    const prevCtr = r.prev_ctr  || 0;
    const prevCvr = r.prev_cvr  || 0;
    const prevCpc = r.prev_cpc  || 0;
    const hasPrevData = prevCtr > 0 || prevRoas > 0;

    function liBadge(label, val, prev, lowBetter){
      if(!prev || !val) return '<span class="li-badge li-badge--neu">'+label+'</span>';
      const good = lowBetter ? val < prev : val > prev;
      const pct  = Math.round(Math.abs(val - prev) / prev * 100);
      const arrow = good ? '&#9650;' : '&#9660;';
      const cls   = good ? 'li-badge--up' : 'li-badge--dn';
      return '<span class="li-badge '+cls+'">'+arrow+' '+label+' '+pct+'%</span>';
    }
    const indHtml = '<div class="leader-indicators">'
      +(hasPrevData
        ? '<div class="leader-ind-row" style="margin-bottom:2px"><span style="font-size:.6rem;color:var(--text3)">vs 지난주</span></div>'
        : '<div class="leader-ind-row" style="margin-bottom:2px"><span style="font-size:.6rem;color:var(--text3)">지난주 데이터 없음</span></div>')
      +'<div class="leader-ind-row">'+liBadge('ROAS',r.roas_pct||0,prevRoas,false)+liBadge('CTR',r.ctr||0,prevCtr,false)+'</div>'
      +'<div class="leader-ind-row">'+liBadge('CVR',r.cvr||0,prevCvr,false)+liBadge('CPC',r.cpc||0,prevCpc,true)+'</div>'
    +'</div>';
    return '<div class="leader-row'+(rank<=3?' leader-row--top':'')+'" onclick="openModal(\''+r.key+'\')">'
      +'<div class="leader-rank '+rCls+'">'+rank+'</div>'
      +'<div class="leader-thumb">'+th+'</div>'
      +'<div class="leader-info">'
        +'<div class="leader-name" title="'+(r.base_key||r.key)+'">'+(r.base_key||r.key)+(function(){var b=calcBadge(r.base_key);if(b.type==='streak')return '<span style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:.62rem;font-weight:700;background:#e8f5e9;color:#2e7d32;margin-left:4px">'+b.count+'주 연속</span>';if(b.type==='comeback')return '<span style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:.62rem;font-weight:700;background:#fff3e0;color:#e65100;margin-left:4px">COME BACK</span>';return '<span style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:.62rem;font-weight:800;background:#185FA5;color:#fff;margin-left:4px">NEW</span>';})()+'</div>'
        +'<div class="leader-tags">'
          +'<span class="tag tp-'+(r.objective||'전환')+'" style="font-size:9px">'+(r.objective||'전환')+'</span>'
          +(r.mgr?'<span class="tag" style="font-size:9px;background:var(--bg3);color:var(--text2)">'+r.mgr+'</span>':'')
          +(r.media?'<span class="tag" style="font-size:9px;background:var(--bg3);color:var(--text2)">'+r.media+'</span>':'')
        +'</div>'
      +'</div>'
      +'<div class="leader-kpi-block">'
        +'<div class="leader-kpi-main">'+fmtS(r.spend)+'</div>'
        +'<div class="leader-kpi-sub">광고비 '+spPortion+'%</div>'
      +'</div>'
      +'<div class="leader-kpi-block">'
        +'<div class="leader-kpi-main '+rvC(r.roas_pct)+'">'+(r.revenue>0?fmtS(r.revenue):'-')+'</div>'
        +'<div class="leader-kpi-sub">매출 '+rvPortion+'%</div>'
      +'</div>'
      +'<div class="leader-bar-block">'
        +'<div class="leader-bar-label"><span>광고비</span><span>'+spPortion+'%</span></div>'
        +'<div class="leader-bar-track"><div class="leader-bar-fill leader-bar-fill--spend" style="width:'+spBarW+'%"></div></div>'
        +'<div class="leader-bar-label" style="margin-top:3px"><span>매출</span><span>'+rvPortion+'%</span></div>'
        +'<div class="leader-bar-track"><div class="leader-bar-fill leader-bar-fill--rev" style="width:'+rvBarW+'%"></div></div>'
      +'</div>'
      +'<div class="leader-kpi-block">'
        +'<div class="leader-kpi-main '+rvC(r.roas_pct||0)+'">'+fmtR(r.roas_pct||0)+'</div>'
        +'<div class="leader-kpi-sub">ROAS</div>'
      +'</div>'
      +indHtml
    +'</div>';
  }).join('');

  return '<div class="sec" id="leaderSec">'
    +'<div class="sec-hd">'
      +'<span class="sec-ico">&#128202;</span>'
      +'<span class="sec-title">매출 리딩 소재</span>'
      +'<span class="sec-sub">광고비 상위 7개 &middot; 전체 광고비의 '+spPct+'% &middot; 전환매출의 '+rvPct+'% 기여</span>'
    +'</div>'
    +'<div class="leader-grid">'+rows+'</div>'
  +'</div>';
}

  // ── AB테스트 섹션 ──
  function buildAbSection(d){
    // 해당 주차에 새로 투입된 소재만 비교 (is_new = age_days<=6)
    const ads = (d.all_ads || []).filter(a=>a.is_new);

    function seriesKey(bk){
      if(!bk) return '';
      return bk.replace(/[-]?\d+[-]?/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
    }

    // 시리즈 그룹핑
    const sg = {};
    ads.forEach(a=>{
      const bk = a.base_key||'';
      const sk = seriesKey(bk);
      if(!sg[sk]) sg[sk]=[];
      sg[sk].push(a);
    });

    // 필터: 변형 2개+, 같은 age, 전환 소재 포함, 총 spend 5만+
    const groups = [];
    Object.entries(sg).forEach(([sk, list])=>{
      const bkeys = [...new Set(list.map(a=>a.base_key))];
      if(bkeys.length < 2) return;
      const ages = [...new Set(list.map(a=>a.age_days).filter(x=>x!=null))];
      if(ages.length !== 1) return;
      const totalSpend = list.reduce((s,a)=>s+a.spend,0);
      if(totalSpend < 50000) return;
      const hasConv = list.some(a=>a.objective==='전환');
      if(!hasConv) return;
      groups.push({sk, list, bkeys, totalSpend, age: ages[0]});
    });

    // spend 합계 내림차순
    groups.sort((a,b)=>b.totalSpend-a.totalSpend);

    if(!groups.length) return '';

    // 지표 튀는 소재 감지 (평균 대비 1.5배 이상 차이)
    function outlier(vals, v){
      if(vals.length < 2) return false;
      const avg = vals.reduce((s,x)=>s+x,0)/vals.length;
      if(avg===0) return v>0;
      return v > avg*1.5 || (v < avg*0.5 && avg>0);
    }

    let html = `<div class="sec" id="abSec">
      <div class="sec-hd">
        <span class="sec-ico">🧪</span>
        <span class="sec-title">AB테스트 소재 비교</span>
        <span class="sec-sub">해당 주차 신규 투입 · 같은 날 투입된 연속 소재 그룹 · ${groups.length}개 시리즈</span>
      </div>`;

    // 투입일 = 주차 기준일(ref_date) - age(N일차), 타임존 무관 계산
    function abLaunchDate(age){
      if(!d.ref_date || age==null) return '';
      const [y,m,dd] = d.ref_date.split('-').map(Number);
      const rd = new Date(Date.UTC(y, m-1, dd));
      rd.setUTCDate(rd.getUTCDate() - age);
      return (rd.getUTCMonth()+1)+'/'+rd.getUTCDate();
    }

    groups.forEach(({sk, list, bkeys, totalSpend, age})=>{
      // 전환 목적 대표 소재 (bkey별 spend 최고)
      const byBkey = {};
      list.filter(a=>a.objective==='전환').forEach(a=>{
        if(!byBkey[a.base_key] || a.spend > byBkey[a.base_key].spend)
          byBkey[a.base_key] = a;
      });
      const reps = Object.values(byBkey).sort((a,b)=>b.spend-a.spend);
      if(!reps.length) return;

      const roasVals = reps.map(r=>r.roas_pct||0);
      const ctrVals  = reps.map(r=>r.ctr||0);
      const cvrVals  = reps.map(r=>r.cvr||0);
      const maxRoas  = Math.max(...roasVals);

      html += `<div class="ab-group">
        <div class="ab-group-hd">
          <span class="ab-series-name">${sk}</span>
          <span class="ab-meta">${bkeys.length}개 변형 · 투입일 ${abLaunchDate(age)} · ${age}일차 · 총 ${Math.round(totalSpend/10000)}만원</span>
        </div>
        <div class="ab-cards">`;

      reps.forEach(r=>{
        const isRoasOut = outlier(roasVals, r.roas_pct||0);
        const isCtrOut  = outlier(ctrVals,  r.ctr||0);
        const isCvrOut  = outlier(cvrVals,  r.cvr||0);
        const isTop     = (r.roas_pct||0) === maxRoas && maxRoas > 0;
        const th        = thumbHtml(r,'ab-no-img','');
        html += `<div class="ab-card${isTop?' ab-card--top':''}" onclick="openAbModal('${sk}')">
          <div class="ab-thumb">${th}</div>
          <div class="ab-card-body">
            <div class="ab-card-name">${r.base_key||r.key}</div>
            <div class="ab-kpis">
              <span class="ab-kpi${isRoasOut?' ab-kpi--out':''}">
                <span class="ab-kpi-label">ROAS</span>
                <span class="ab-kpi-val">${r.roas_pct||0}%</span>
              </span>
              <span class="ab-kpi${isCtrOut?' ab-kpi--out':''}">
                <span class="ab-kpi-label">CTR</span>
                <span class="ab-kpi-val">${(r.ctr||0).toFixed(2)}%</span>
              </span>
              <span class="ab-kpi${isCvrOut?' ab-kpi--out':''}">
                <span class="ab-kpi-label">CVR</span>
                <span class="ab-kpi-val">${(r.cvr||0).toFixed(2)}%</span>
              </span>
              <span class="ab-kpi">
                <span class="ab-kpi-label">구매</span>
                <span class="ab-kpi-val">${r.purchases||0}건</span>
              </span>
              <span class="ab-kpi">
                <span class="ab-kpi-label">광고비</span>
                <span class="ab-kpi-val">${Math.round((r.spend||0)/10000)}만</span>
              </span>
            </div>
          </div>
          ${isTop?'<div class="ab-top-badge">👑 최고</div>':''}
        </div>`;
      });

      html += `</div></div>`;
    });

    html += '</div>';
    return html;
  }

  // 섹션5: 테이블 — 펼치기 전까지 렌더 지연 (성능 최적화)

// 테이블 정렬
let tblSortCol = 'spend';
let tblSortDir = 'desc';

function sortTbl(col, thEl){
  const d = cache[curWeekId]; if(!d) return;
  if(tblSortCol === col){
    tblSortDir = tblSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    tblSortCol = col;
    // 숫자형 기본 desc, 문자형 기본 asc
    const numCols = ['spend','roas_pct','old_roas_pct','roas_delta','purchases','ctr','cvr','win_score','age_days'];
    tblSortDir = numCols.includes(col) ? 'desc' : 'asc';
  }
  // 헤더 클래스 업데이트
  document.querySelectorAll('.th-sort').forEach(th=>{
    th.classList.remove('asc','desc');
  });
  thEl.classList.add(tblSortDir);

  const rows = [...(d.all_ads||[])];
  const numCols2 = ['spend','roas_pct','old_roas_pct','roas_delta','purchases','ctr','cvr','win_score','age_days'];
  
  rows.sort((a,b)=>{
    let av, bv;
    if(col === 'name'){
      av = (a.base_key||a.key||'').toLowerCase();
      bv = (b.base_key||b.key||'').toLowerCase();
    } else {
      av = a[col]; bv = b[col];
    }
    // null/undefined 처리 → 항상 뒤로
    if(av == null && bv == null) return 0;
    if(av == null) return 1;
    if(bv == null) return -1;
    
    let cmp;
    if(numCols2.includes(col)){
      cmp = av - bv;
    } else {
      cmp = String(av).localeCompare(String(bv), 'ko');
    }
    return tblSortDir === 'asc' ? cmp : -cmp;
  });

  const tbody = document.getElementById('tblBody');
  if(!tbody) return;
  // 정렬 시 펼쳐져 있지 않으면 먼저 렌더 상태로 표시
  tbody.dataset.rendered = '1';
  tbody.innerHTML = rows.map(r=>{
    const dT=r.roas_delta!=null?`<span class="tag ${r.roas_delta>0?'td-up':'td-dn'}">${r.roas_delta>0?'+':''}${Math.round(r.roas_delta)}%</span>`:'–';
    const ws=r.win_score!=null?`<span class="tag" style="background:#EAF3DE;color:#27500A">${r.win_score}점</span>`:'';
    return`<tr style="cursor:pointer" onclick="openModal('${r.key}')">
      <td style="min-width:110px"><span class="mgr-dot" style="background:${MC[r.mgr]};margin-right:4px"></span><span style="color:var(--text2);font-size:10px">${r.base_key||r.key}</span></td>
      <td><span class="tag ${PC[r.objective||r.purpose]||'tp-기타'}" style="font-size:9px">${r.objective||r.purpose}</span></td>
      <td>${r.pa_type&&r.pa_type!=='-'?`<span class="tag pa-${r.pa_type}" style="font-size:9px">${r.pa_type}</span>`:''}</td>
      <td>${r.landing&&r.landing!=='기타'?`<span class="tag tl-${r.landing}" style="font-size:9px">${r.landing}</span>`:''}</td>
      <td><span class="tag tm-${r.media}" style="font-size:9px">${r.media}</span></td>
      <td>${r.age_days!=null?`<span class="tag ${ageCls(r.age_days)}" style="font-size:9px">D+${r.age_days}</span>`:'-'}</td>
      <td>${fmtS(r.spend)}</td>
      <td><span class="${rvC(r.roas_pct)}">${r.roas_pct>0?fmtR(r.roas_pct):'-'}</span></td>
      <td style="color:var(--text3)">${r.old_roas_pct?fmtR(r.old_roas_pct):'-'}</td>
      <td>${dT}</td>
      <td>${r.purchases>0?r.purchases+'건':'-'}</td>
      <td><span class="tip" style="cursor:default">${r.ctr>0?r.ctr+'%':'-'}${tipHtml('ctr')}</span></td>
      <td><span class="tip" style="cursor:default">${r.cvr>0?r.cvr+'%':'-'}${tipHtml('cvr')}</span></td>

  }).join('');

// 트렌드
function getTrendInsight(r, type){
  // 자동 분석 문구
  const rd = r._roas_drop||0, cvd = r._cvr_drop||0;
  const roasUp = r.roas_pct > (r.old_roas_pct||0);
  const ctrUp = r.ctr > (r.prev_ctr||0);
  const cvrUp = r.cvr > (r.prev_cvr||0);
  if(type==='spend_up'){
    if(roasUp) return {msg:'광고비 증가 + ROAS 동반 상승 → 확장 고려', cls:'up'};
    if(r.roas_pct >= (r.old_roas_pct||0)*0.95) return {msg:'광고비 증가, 효율 유지 중', cls:'up'};
    return {msg:'광고비 증가했지만 효율 하락 주의', cls:'warn'};
  }
  if(type==='rev_up'){
    if(cvrUp) return {msg:'전환율 개선으로 매출 성장', cls:'up'};
    if(ctrUp) return {msg:'클릭률 개선으로 매출 성장', cls:'up'};
    return {msg:'지출 확대로 매출 증가, 효율 점검 필요', cls:'warn'};
  }
  if(type==='cpc_eff_up'){
    if(roasUp) return {msg:'CPC 하락 + ROAS 상승 → 효율 개선', cls:'up'};
    return {msg:'클릭 비용 절감, 전환 효율 추가 확인', cls:'up'};
  }
  if(type==='conv_dn'){
    if(rd>=30) return {msg:'ROAS 급락, 소재 피로도 확인 필요', cls:'dn'};
    if(cvd>=30) return {msg:'클릭은 되지만 전환 안됨, 랜딩 점검', cls:'dn'};
    return {msg:'클릭률·전환율 동반 하락, 소재 교체 검토', cls:'dn'};
  }
  if(type==='cpc_eff_dn'){
    if((r._rise||0)>=50) return {msg:'CPC 급등, 경쟁 심화 또는 타겟 문제', cls:'dn'};
    return {msg:'클릭 비용 상승 중, 소재 점검 필요', cls:'warn'};
  }
  return null;
}

function mkTrow2(r, type){
  const isUp = type.endsWith('up');
  const iu = imgSrc(r.img,'w200');

  // 필터별 핵심 변동 수치
  let bigNum='', bigCls='', flowHtml='', subLine='';
  if(type==='spend_up'){
    bigNum=`+${fmtS(r._v||0)}`;bigCls='rv-good';
    flowHtml=`${fmtS(r.prev_spend||0)} <span class="tcard-arrow">→</span> ${fmtS(r.spend)} <span style="color:#1D9E75;font-weight:600">(+${(r._p||0).toFixed(0)}%)</span>`;
    subLine=`ROAS ${r.old_roas_pct?fmtR(r.old_roas_pct):'–'} → ${fmtR(r.roas_pct)}`;
  } else if(type==='rev_up'){
    bigNum=`+${fmtS(r._v||0)}`;bigCls='rv-good';
    flowHtml=`${fmtS(r.prev_revenue||0)} <span class="tcard-arrow">→</span> ${fmtS(r.revenue)} <span style="color:#1D9E75;font-weight:600">(+${(r._p||0).toFixed(0)}%)</span>`;
    subLine=`광고비 ${fmtS(r.spend)} · ROAS ${fmtR(r.roas_pct)}`;
  } else if(type==='cpc_eff_up'){
    bigNum=`-${(r._drop||0).toFixed(0)}%`;bigCls='rv-good';
    flowHtml=`CPC ₩${Math.round(r.prev_cpc||0).toLocaleString()} <span class="tcard-arrow">→</span> ₩${Math.round(r.cpc||0).toLocaleString()} <span style="color:#1D9E75;font-weight:600">(-${(r._drop||0).toFixed(0)}%)</span>`;
    subLine=`광고비 ${fmtS(r.spend)} · CTR ${r.ctr}%`;

  } else if(type==='cpc_eff_dn'){
    bigNum=`+${(r._rise||0).toFixed(0)}%`;bigCls='rv-bad';
    flowHtml=`CPC ₩${Math.round(r.prev_cpc||0).toLocaleString()} <span class="tcard-arrow">→</span> ₩${Math.round(r.cpc||0).toLocaleString()} <span style="color:#E5484D;font-weight:600">(+${(r._rise||0).toFixed(0)}%)</span>`;
    subLine=`광고비 ${fmtS(r.spend)} · ROAS ${fmtR(r.roas_pct)}`;
  }

  return`<div class="tcard ${isUp?'up':'dn'}" onclick="openModal('${r.key}')">
    <div class="tcard-body">
      <div class="tcard-thumb">${iu?`<img src="${iu}" loading="lazy" onerror="this.style.display='none'">`:''}</div>
      <div class="tcard-info">
        <div class="tcard-name">
          <span class="mgr-dot" style="background:${MC[r.mgr]}"></span>

          ${r.age_days!=null?`<span class="tag ${ageCls(r.age_days)}" style="font-size:9px">D+${r.age_days}</span>`:''}
        </div>
        <div class="tcard-delta">
          <span class="tcard-big ${bigCls}">${bigNum}</span>
        </div>
        <div class="tcard-flow">${flowHtml}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${subLine}</div>
        ${insight?`<span class="tcard-insight ${insight.cls}"><i class="ti ti-bulb" style="font-size:10px"></i>${insight.msg}</span>`:''}
      </div>
    </div>
  </div>`;

// 파이차트
function renderPieCharts(pie){
  if(!pie)return;
  Object.values(pieCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  pieCharts={};
  function mkPie(canvasId,legId,dataObj){
    const ctx=document.getElementById(canvasId);
    if(!ctx||!dataObj)return;
    const labels=Object.keys(dataObj).filter(k=>dataObj[k]>0);
    const values=labels.map(k=>dataObj[k]);
    const total=values.reduce((a,b)=>a+b,0);
    if(total===0)return;
    const colors=labels.map(l=>PIE_COLORS[l]||'#9CA3AF');
    pieCharts[canvasId]=new Chart(ctx,{
      type:'doughnut',
      data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:1.5,borderColor:'var(--bg)'}]},
      options:{responsive:false,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const pct=(c.parsed/total*100).toFixed(1);return` ${c.label}: ${fmtS(c.parsed)} (${pct}%)`;}}}}}
    });
    const leg=document.getElementById(legId);
    if(leg)leg.innerHTML=labels.map((l,i)=>{
      const pct=(values[i]/total*100).toFixed(1);
      return`<div class="pie-legend-row"><span style="width:7px;height:7px;border-radius:50%;background:${colors[i]};flex-shrink:0"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l}</span><span style="font-weight:600;color:var(--text);margin-left:4px">${pct}%</span></div>`;
    }).join('');
  }
  mkPie('pieObj','pieObjLeg',pie.objective);
  mkPie('piePa','piePaLeg',pie.pa_type);
  mkPie('pieLand','pieLandLeg',pie.landing);
}

async function openModal(key){
  mKey=key;
  // 로드 안 된 주차 데이터 백그라운드 fetch
  const unloaded = weeks.filter(w => !cache[w.id]);
  if(unloaded.length){

// localStorage 기반 (브라우저 로컬 저장, 팀 공유는 JSONBin API key 설정 시 활성화)
const JSONBIN_API_KEY = '$2a$10$Ma9Mewe6lm2OO9cUDJ9hfOZ6N0R7KvD4XCc1.oyuWzTH0jsGsDUdy';
const JSONBIN_BIN_ID = '6a2bc843da38895dfeb39b5d';

let boardKey = null;
let boardCache = {}; // 로컬 캐시

// 저장소 추상화 - localStorage 또는 JSONBin
const Store = {
  async get(key){
    // JSONBin 설정 시 항상 서버 우선 (팀 공유)
    if(JSONBIN_API_KEY && JSONBIN_BIN_ID){
      try{
        const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
          {headers:{'X-Master-Key': JSONBIN_API_KEY}});
        const d = await r.json();
        return (d.record||{})[key] || null;
      }catch(e){
        // JSONBin 실패 시 localStorage 폴백
        try{ return JSON.parse(localStorage.getItem(key)); }catch(e2){ return null; }
      }
    }
    // JSONBin 미설정 시 localStorage
    try{ return JSON.parse(localStorage.getItem(key)); }catch(e){ return null; }
  },
  async set(key, val){
    if(JSONBIN_API_KEY && JSONBIN_BIN_ID){
      try{
        // 서버에서 최신 전체 record 읽기
        const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
          {headers:{'X-Master-Key': JSONBIN_API_KEY}});
        const d = await r.json();
        const record = d.record || {};
        record[key] = val;
        await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,{
          method:'PUT',
          headers:{'Content-Type':'application/json','X-Master-Key': JSONBIN_API_KEY},
          body: JSON.stringify(record)
        });
        return; // JSONBin 성공하면 localStorage는 불필요
      }catch(e){ console.error('JSONBin 저장 실패', e); }
    }
    // JSONBin 미설정이거나 실패 시 localStorage
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }
};

function timeAgo(ts){
  const d = Date.now() - ts;
  if(d < 60000) return '방금';
  if(d < 3600000) return Math.floor(d/60000)+'분 전';
  if(d < 86400000) return Math.floor(d/3600000)+'시간 전';
  return Math.floor(d/86400000)+'일 전';
}

async function loadBoard(key){
  boardKey = key;
  const el = document.getElementById('boardList');
  if(el) el.innerHTML = '<div class="board-empty" style="color:var(--text3)">불러오는 중...</div>';
  const posts = await Store.get('board:' + key) || [];
  renderBoard(posts);
}

function renderBoard(posts){
  const el = document.getElementById('boardList');
  if(!el) return;
  if(!posts || posts.length === 0){
    el.innerHTML = '<div class="board-empty">첫 번째 메모를 남겨보세요</div>';
    return;
  }
  el.innerHTML = posts.map((p,i) => renderPost(p, i)).join('');
}

function renderPost(p, idx){
  const replies = p.replies || [];
  const replyHtml = replies.map(r =>
    '<div class="bpost reply">' +
    '<div class="bpost-hdr"><span class="bpost-nick">'+escHtml(r.nick)+'</span><span class="bpost-time">'+timeAgo(r.ts)+'</span></div>' +
    '<div class="bpost-body">'+escHtml(r.body)+'</div>' +
    '</div>'
  ).join('');
  return '<div class="bpost">' +
    '<div class="bpost-hdr"><span class="bpost-nick">'+escHtml(p.nick)+'</span><span class="bpost-time">'+timeAgo(p.ts)+'</span></div>' +
    '<div class="bpost-body">'+escHtml(p.body)+'</div>' +
    '<div class="bpost-actions"><button class="bpost-reply-btn" onclick="toggleReplyForm('+idx+')"><i class="ti ti-corner-down-right" style="font-size:10px"></i> 답글</button></div>' +
    '<div id="replyForm_'+idx+'" style="display:none">' +
      '<div class="breply-form">' +
        '<input class="board-nick" id="rNick_'+idx+'" placeholder="닉네임" maxlength="12" style="width:80px">' +
        '<textarea class="board-text" id="rText_'+idx+'" placeholder="답글..." rows="1" style="min-height:32px"></textarea>' +
        '<button class="board-submit" onclick="submitReply('+idx+')" style="height:auto;padding:6px 12px">등록</button>' +
      '</div>' +
    '</div>' +

    '</div>';
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleReplyForm(idx){
  const el = document.getElementById('replyForm_'+idx);

async function submitPost(){
  const nick = ((document.getElementById('bNick')||{}).value||'').trim() || '익명';
  const body = ((document.getElementById('bText')||{}).value||'').trim();
  if(!body) return;
  const posts = await Store.get('board:' + boardKey) || [];
  posts.unshift({nick, body, ts: Date.now(), replies:[]});
  await Store.set('board:' + boardKey, posts);
  const tb = document.getElementById('bText');
  if(tb) tb.value = '';
  renderBoard(posts);
  const list = document.getElementById('boardList');
  if(list) list.scrollTop = 0;
}

async function submitReply(idx){
  const nick = ((document.getElementById('rNick_'+idx)||{}).value||'').trim() || '익명';
  const body = ((document.getElementById('rText_'+idx)||{}).value||'').trim();
  if(!body) return;
  const posts = await Store.get('board:' + boardKey) || [];
  if(!posts[idx]) return;
  if(!posts[idx].replies) posts[idx].replies = [];
  posts[idx].replies.push({nick, body, ts: Date.now()});
  await Store.set('board:' + boardKey, posts);
  renderBoard(posts);
}

/* ───── AB 비교 팝업 ───── */
let _abGroup = null;


const AB_SORTS = [
  {key:'spend',    label:'광고비'},
  {key:'purchases',label:'구매'},
  {key:'roas_pct', label:'ROAS'},
  {key:'ctr',      label:'CTR'},
  {key:'cpc',      label:'CPC'},
];
let _abSortKey = 'spend';

function openAbModal(seriesKeyArg){
  const d = cache[curWeekId]; if(!d) return;
  // 해당 주차에 새로 투입된 소재만 (메인 섹션과 동일 기준)
  const ads = (d.all_ads || []).filter(a=>a.is_new);

  function seriesKey(bk){
    if(!bk) return '';
    return bk.replace(/[-]?\d+[-]?/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
  }
  const sg = {};
  ads.forEach(a=>{
    const sk = seriesKey(a.base_key||'');
    if(!sg[sk]) sg[sk]=[];
    sg[sk].push(a);
  });

  const groups = [];
  Object.entries(sg).forEach(([sk, list])=>{
    const bkeys = [...new Set(list.map(a=>a.base_key))];
    if(bkeys.length < 2) return;
    const ages = [...new Set(list.map(a=>a.age_days).filter(x=>x!=null))];
    if(ages.length !== 1) return;
    const totalSpend = list.reduce((s,a)=>s+a.spend,0);
    if(totalSpend < 50000) return;
    if(!list.some(a=>a.objective==='전환')) return;
    groups.push({sk, list, bkeys, totalSpend, age: ages[0]});
  });
  groups.sort((a,b)=>b.totalSpend-a.totalSpend);

  _abGroup = groups.find(g => g.sk === seriesKeyArg);
  if(!_abGroup) return;
  _abSortKey = 'spend';
  renderAbModal();
  const mov = document.getElementById('abMov');
  mov.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeAbModal(){
  document.getElementById('abMov').classList.remove('show');
  document.body.style.overflow = '';
}

  var key = el.dataset.adkey;

function renderAbModal(){
  if(!_abGroup) return;
  const {sk, list, bkeys, totalSpend, age} = _abGroup;

  document.getElementById('abMTitle').textContent = '🧪 ' + sk;
  const _abRef = (cache[curWeekId] && cache[curWeekId].ref_date) || null;
  const _abLaunch = (()=>{
    if(!_abRef || age==null) return '';
    const [y,m,dd] = _abRef.split('-').map(Number);
    const rd = new Date(Date.UTC(y, m-1, dd));
    rd.setUTCDate(rd.getUTCDate() - age);
    return (rd.getUTCMonth()+1)+'/'+rd.getUTCDate();
  })();
  document.getElementById('abMSub').textContent =
    `${bkeys.length}개 변형 · 투입일 ${_abLaunch} · ${age}일차 · 총 ${Math.round(totalSpend/10000)}만원`;

  // 정렬 탭 (최초 1회만 렌더)
  const tabsEl = document.getElementById('abSortTabs');
  tabsEl.innerHTML = AB_SORTS.map(s=>
    `<button class="ab-sort-tab${_abSortKey===s.key?' on':''}"
      data-key="${s.key}"
      onclick="setAbSort(this.dataset.key)">${s.label}순</button>`
  ).join('');

  renderAbGrid();
}

function renderAbGrid(){
  if(!_abGroup) return;
  const {list} = _abGroup;
  const gridEl = document.getElementById('abCompareGrid');
  if(!gridEl) return;

  // 전환 목적 대표 소재 (bkey별 spend 최고)
  const byBkey = {};
  list.filter(a=>a.objective==='전환').forEach(a=>{
    if(!byBkey[a.base_key] || a.spend > byBkey[a.base_key].spend)
      byBkey[a.base_key] = a;
  });
  let reps = Object.values(byBkey);

  // 위닝 판정: 광고비 10만원 이상 + 전환 3개 이상
  function isAbWin(r){ return (r.spend||0)>=100000 && (r.purchases||0)>=3; }

  // 정렬
  if(_abSortKey === 'cpc'){
    reps.sort((a,b)=>{
      const av=a.cpc||0, bv=b.cpc||0;
      if(!av && !bv) return 0;
      if(!av) return 1;
      if(!bv) return -1;
      return av-bv;
    });
  } else if(_abSortKey === 'spend'){
    // 광고비순: 위닝 먼저, 그 다음 광고비 내림차순
    reps.sort((a,b)=>{
      if(isAbWin(a) !== isAbWin(b)) return isAbWin(a)?-1:1;
      return (b.spend||0)-(a.spend||0);
    });
  } else {
    // 그 외: 위닝 먼저, 그 다음 해당 지표 내림차순
    reps.sort((a,b)=>{
      if(isAbWin(a) !== isAbWin(b)) return isAbWin(a)?-1:1;
      return (b[_abSortKey]||0)-(a[_abSortKey]||0);
    });
  }

  // best/worst
  function bw(arr, key, lowBetter){
    const vals = arr.map(r=>r[key]||0).filter(v=>v>0);
    if(!vals.length) return {best:null,worst:null};
    return lowBetter
      ? {best:Math.min(...vals), worst:Math.max(...vals)}
      : {best:Math.max(...vals), worst:Math.min(...vals)};
  }
  const bwRoas=bw(reps,'roas_pct',false);
  const bwCtr =bw(reps,'ctr',false);
  const bwCvr =bw(reps,'cvr',false);
  const bwCpc =bw(reps,'cpc',true);
  const bwPur =bw(reps,'purchases',false);
  const bwSpd =bw(reps,'spend',false);

  function vc(val, bwObj){
    if(!bwObj.best || !val) return '';
    if(val===bwObj.best) return ' best';
    if(val===bwObj.worst && bwObj.best!==bwObj.worst) return ' worst';
    return '';
  }

  // 위닝 존재 여부 (그룹 내)
  const hasWinner = reps.some(isAbWin);

  gridEl.innerHTML = reps.map((r,idx)=>{
    const rank = idx+1;
    const isWin      = isAbWin(r);
    // 위닝 소재가 있을 때만 왕관 표시, 없으면 배지 없음
    const crownBadge = (hasWinner && isWin)
      ? '<div class="ab-rank-badge r1" style="font-size:.75rem">&#128081;</div>' : '';
    const rankCls    = (hasWinner && isWin) ? 'rank-1' : '';
    const rankBadge  = crownBadge;
    const th = r.img
      ? '<img src="'+imgSrc(r.img,'w400')+'" loading="lazy" onerror="this.style.display=&#39;none&#39;">'
      : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:2rem">&#9654;</div>';

    const rows = [
      {label:'ROAS',  val:r.roas_pct>0?fmtR(r.roas_pct):'-', cls:vc(r.roas_pct||0,bwRoas)},
      {label:'CTR',   val:r.ctr>0?r.ctr+'%':'-',              cls:vc(r.ctr||0,bwCtr)},
      {label:'CVR',   val:r.cvr>0?r.cvr+'%':'-',              cls:vc(r.cvr||0,bwCvr)},
      {label:'CPC',   val:r.cpc>0?'₩'+r.cpc.toLocaleString():'-', cls:vc(r.cpc||0,bwCpc)},
      {label:'구매',   val:r.purchases>0?r.purchases+'건':'-',  cls:vc(r.purchases||0,bwPur)},
      {label:'광고비', val:r.spend>0?'₩'+r.spend.toLocaleString():'-', cls:vc(r.spend||0,bwSpd)},
      {label:'노출',   val:r.impressions>0?(r.impressions/10000).toFixed(1)+'만':'-', cls:''},
      {label:'클릭',   val:r.clicks>0?r.clicks.toLocaleString():'-', cls:''},
    ];

    const rowsHtml = rows.map(row=>
      '<div class="ab-crow">'
      +'<span class="ab-crow-label">'+row.label+'</span>'
      +'<span class="ab-crow-val'+row.cls+'">'+row.val+'</span>'
      +'</div>'
    ).join('');

    return '<div class="ab-ccard '+rankCls+'" data-adkey="'+r.key+'" onclick="abCardClick(this)">'
      +rankBadge
      +'<div class="ab-cthumb">'+th+'</div>'
      +'<div class="ab-cbody">'
        +'<div class="ab-cname" title="'+(r.base_key||r.key)+'">'+(r.base_key||r.key)+'</div>'
        +rowsHtml
      +'</div>'
    +'</div>';
  }).join('');
}
