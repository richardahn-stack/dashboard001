// 이번 주 일요일 ~ 오늘 날짜 계산
function getRtDateRange(){
  // KST(UTC+9) 기준 오늘 날짜
  const nowKST  = new Date(Date.now() + 9*60*60*1000);
  const todayStr= nowKST.toISOString().slice(0,10);
  const dow     = nowKST.getUTCDay(); // 0=일, 1=월 ...

  // 이번 주 일요일 (meta_sync.py 기준: end=일요일, start=월요일)
  // W25 end = 지난 일요일 → 실시간 start = 그 다음 날(월요일)
  const sun  = new Date(nowKST);
  sun.setUTCDate(nowKST.getUTCDate() - dow); // 이번 주 일요일
  const mon  = new Date(sun);
  mon.setUTCDate(sun.getUTCDate() + 1);      // 이번 주 월요일 (실시간 시작)
  const monStr = mon.toISOString().slice(0,10);

  // 일요일이면 start=오늘(일), end=오늘 (주 첫날)
  const startStr = dow === 0 ? todayStr : monStr;

  return { start: startStr, end: todayStr };
}

// 메타 API 페이지네이션
async function rtFetch(path, params){
  const tok = getRtToken();
  const url = new URL(RT_API + '/' + path);
  Object.entries({...params, access_token: tok, limit: 500}).forEach(([k,v])=>url.searchParams.set(k,v));
  const results = [];
  let nextUrl = url.toString();
  while(nextUrl){
    const r = await fetch(nextUrl);
    if(!r.ok){ const e = await r.json(); throw new Error(e.error?.message || r.status); }
    const d = await r.json();
    if(d.error) throw new Error(d.error.message);
    (d.data||[d]).forEach(i=>results.push(i));
    nextUrl = d.paging?.next || null;
  }
  return results;
}

// ── meta_sync.py 분류 로직 1:1 포팅 (과거 탭과 소재명/집계 기준 통일) ──
const RT_SKIP = new Set(['공식','DT','dt','영상','배너','콘조','오딧','플랩','핑크프로모션',
  '전환','상시','2차활용','카탈로그','트래픽','핑크사전','웨딩프로모션']);

function rtGetLanding(camp, ad){
  if(['아이시핑크','핑크프로모션','핑크사전'].some(k=>camp.includes(k))) return '핑크';
  if(camp.includes('웨딩')) return '웨딩';
  if(ad.includes('플랩') && !ad.includes('오딧')) return '플랩';
  if(ad.includes('오딧') && !ad.includes('플랩')) return '오딧';
  if(camp.includes('플랩') && !camp.includes('오딧')) return '플랩';
  if(camp.includes('오딧') && !camp.includes('플랩')) return '오딧';
  if(camp.includes('오딧') && camp.includes('플랩')) return '오딧+플랩';
  return '기타';
}
function rtClassify(camp, ad){
  let obj;
  if(camp.includes('트래픽')) obj='트래픽';
  else if(camp.includes('콘텐츠조회')) obj='콘조';
  else obj='전환';
  const pa = (obj==='전환') ? (camp.includes('PA')?'PA':'자컨') : '-';
  return {obj, pa, land: rtGetLanding(camp, ad)};
}
function rtAssignMgr(name){
  if(name.includes('파트너스') || name.includes('인스타툰')) return '파트너스';
  const nd = name.split('_').filter(p=>!/^\d{6}$/.test(p));
  const last = nd.length ? nd[nd.length-1].trim() : '';
  for(const m of ['리지','콜리','세레나']){ if(last===m) return m; }
  return '기타';
}
function rtGetMedia(name){ return name.includes('배너') ? '배너' : '영상'; }
function rtExtractBk(name){
  return name.split('_').filter(p=>!/^\d{6}$/.test(p) && !RT_SKIP.has(p)).join('_');
}
function rtGetAge(name, refDate){
  let ms = [...name.matchAll(/(?:^|_)(\d{6})(?:_|$|\.)/g)].map(m=>m[1]);
  if(!ms.length) ms = [...name.matchAll(/(\d{6})/g)].map(m=>m[1]);
  if(!ms.length) return null;
  const s = '20'+ms[ms.length-1];
  const y=+s.slice(0,4), mo=+s.slice(4,6), d=+s.slice(6,8);
  const dt = new Date(Date.UTC(y, mo-1, d));
  if(isNaN(dt.getTime())) return null;
  const days = Math.floor((refDate - dt)/(24*60*60*1000));
  return days>=0 ? days : null;
}

// insights 데이터 파싱 (meta_sync.py parse_insights 동일 로직: 키별 그룹 집계)
function rtParseInsights(insights, refDate){
  const rows = {};
  insights.forEach(i=>{
    const ad_name = i.ad_name || '';
    const camp    = i.campaign_name || '';
    if(!ad_name) return;
    const spend = parseFloat(i.spend||0);
    if(spend <= 0) return;

    const impr   = parseInt(i.impressions||0);
    const clicks = parseInt(i.clicks||0);
    const actions = {}; (i.actions||[]).forEach(a=>actions[a.action_type]=parseFloat(a.value));
    const avals   = {}; (i.action_values||[]).forEach(a=>avals[a.action_type]=parseFloat(a.value));
    const purch = actions['purchase'] || 0;
    const rev   = avals['purchase'] || 0;
    const roasList = i.purchase_roas || [];
    const roas = roasList.length ? parseFloat(roasList[0].value) : 0;

    const {obj, pa, land} = rtClassify(camp, ad_name);
    const bk  = rtExtractBk(ad_name);
    const key = obj+'_'+bk+'_'+land;
    const mgr = rtAssignMgr(ad_name);
    const media = rtGetMedia(ad_name);
    const age = rtGetAge(ad_name, refDate);

    if(!rows[key]){
      rows[key] = {
        key, base_key: bk, ad_id: i.ad_id, _max_spend: spend,
        objective: obj, pa_type: pa, landing: land, purpose: obj,
        mgr, media,
        spend:0, impressions:0, clicks:0, purchases:0, revenue:0,
        roas_sum:0, roas_n:0, age_days: age,
      };
    } else if(spend > (rows[key]._max_spend||0)){
      rows[key].ad_id = i.ad_id; rows[key]._max_spend = spend;
    }
    const r = rows[key];
    r.spend += spend; r.impressions += impr; r.clicks += clicks;
    r.purchases += purch; r.revenue += rev;
    if(roas>0){ r.roas_sum += roas; r.roas_n++; }
  });

  return Object.values(rows).map(r=>{
    const roas = r.roas_n ? r.roas_sum/r.roas_n : 0;
    const out = {
      ...r,
      roas, roas_pct: Math.round(roas*100),
      ctr: r.impressions ? Math.round(r.clicks/r.impressions*10000)/100 : 0,
      cvr: r.clicks ? Math.round(r.purchases/r.clicks*10000)/100 : 0,
      cpc: r.clicks ? Math.round(r.spend/r.clicks) : 0,
      spend: Math.round(r.spend), revenue: Math.round(r.revenue),
      is_new: (r.age_days!=null && r.age_days<=6),
      win_score: null, win_type: null, win_flags: {},
      img: null, img_type: 'img', video: null, video_src: null,
      old_roas_pct: null,
      prev_spend: null, prev_revenue: null, prev_ctr: null,
      prev_cvr: null, prev_cpc: null, prev_purchases: null,
    };
    delete out.roas_sum; delete out.roas_n; delete out._max_spend;
    return out;
  });
}

// 이번 주 JSON 빌드 (실시간)
async function buildRtWeekJson(){
  const {start, end} = getRtDateRange();
  // ── 환산 계수: 지난주(7일) 볼륨을 이번 주 경과일수에 맞춰 보정 ──
  const _msDay = 86400000;
  const elapsedDays = Math.max(1, Math.min(7,
    Math.floor((new Date(end+'T00:00:00+09:00') - new Date(start+'T00:00:00+09:00'))/_msDay) + 1));
  const prevFactor = elapsedDays / 7;
  const rtStatusEl = document.getElementById('rtLiveStatus');
  if(rtStatusEl) rtStatusEl.textContent = '🔄 실시간 데이터 수집 중...';

  // ── 이번 주 insights 호출 ──
  const insights = await rtFetch(RT_ACCOUNT+'/insights', {
    level: 'ad',
    time_range: JSON.stringify({since:start, until:end}),
    fields: 'ad_id,ad_name,campaign_name,spend,impressions,clicks,ctr,cpc,actions,action_values,purchase_roas',
  });

  // 집계 기준일 = end(오늘), 과거 탭과 동일하게 age_days 계산
  const refDate = new Date(end+'T00:00:00+09:00');
  const rows = rtParseInsights(insights, refDate);

  // ── 소재 이미지 수집: 광고비 상위 + 이번 주 신규 소재 우선 ──
  const imgMap = {};
  const bySpend = [...rows].sort((a,b)=>(b.spend||0)-(a.spend||0));
  const imgTargets = bySpend.slice(0,40);
  rows.forEach(r=>{ if(r.is_new && !imgTargets.includes(r)) imgTargets.push(r); });
  await Promise.all(imgTargets.map(async r=>{
    if(!r.ad_id) return;
    try{
      const cr = await rtFetch(r.ad_id+'/adcreatives',
        {fields:'thumbnail_url,image_url,video_id,object_story_spec,asset_feed_spec,picture'});
      const c0  = cr[0]||{};
      const oss = c0.object_story_spec||{};
      const afs = c0.asset_feed_spec||{};
      const vid = c0.video_id||null;
      let thumb=null, type='img';
      if(vid){
        type='video';
        thumb = (oss.video_data && oss.video_data.image_url)
              || (afs.videos && afs.videos[0] && afs.videos[0].thumbnail_url)
              || c0.picture || c0.thumbnail_url || null;
      } else {
        thumb = c0.image_url || c0.picture
              || (oss.link_data && (oss.link_data.image_url || oss.link_data.picture))
              || (afs.images && afs.images[0] && afs.images[0].url)
              || c0.thumbnail_url || null;
      }
      imgMap[r.ad_id] = {img: thumb, img_type: type, video: vid};
    }catch(e){}
  }));
  rows.forEach(r=>{ if(imgMap[r.ad_id]) Object.assign(r, imgMap[r.ad_id]); });

  // ── 이전 주 데이터: 가장 최근 과거 주차 JSON에서 가져오기 ──
  const prevW = weeks.find(w=>w.id!=='RT-LIVE');
  const prevWeekId = prevW ? prevW.id : null;
  let prevData = prevWeekId ? (cache[prevWeekId]||null) : null;
  if(prevWeekId && !prevData){
    try{ const r=await fetch('data/'+prevWeekId+'.json'); if(r.ok){ prevData=await r.json(); cache[prevWeekId]=prevData; } }catch(e){}
  }
  const prevRows   = prevData ? (prevData.all_ads||[]) : [];
  const prevMap    = {};
  prevRows.forEach(r=>{ prevMap[r.key] = r; });

  // ── 이번 주 집계 ──
  const conv    = rows.filter(r=>r.objective==='전환');
  const tSpend  = rows.reduce((s,r)=>s+(r.spend||0),0);
  const tRev    = rows.reduce((s,r)=>s+(r.revenue||0),0);
  const cSpend  = conv.reduce((s,r)=>s+(r.spend||0),0);
  const cRev    = conv.reduce((s,r)=>s+(r.revenue||0),0);
  const avgRoas = cSpend>0 ? Math.round(cRev/cSpend*1000)/10 : 0;
  const avgCtr  = conv.length>0 ? Math.round(conv.reduce((s,r)=>s+r.ctr,0)/conv.length*100)/100 : 0;
  const avgCvr  = conv.length>0 ? Math.round(conv.reduce((s,r)=>s+r.cvr,0)/conv.length*100)/100 : 0;
  const cpcRows = conv.filter(r=>r.cpc>0);
  const avgCpc  = cpcRows.length>0 ? Math.round(cpcRows.reduce((s,r)=>s+r.cpc,0)/cpcRows.length) : 0;
  const avgPur  = conv.length>0 ? Math.round(conv.reduce((s,r)=>s+r.purchases,0)/conv.length*10)/10 : 0;

  // ── prev_* 필드: 이전 주 캐시 소재 매핑 (key 기준, 과거 탭과 동일) ──
  rows.forEach(r=>{
    const p = prevMap[r.key];
    if(p){
      // 볼륨 지표: 지난주 7일치를 이번 주 경과일수로 환산
      r.prev_spend    = Math.round((p.spend||0)*prevFactor);
      r.prev_revenue  = Math.round((p.revenue||0)*prevFactor);
      r.prev_purchases= Math.round((p.purchases||0)*prevFactor);
      // 비율 지표: 일수 무관 → 환산하지 않음
      r.prev_ctr      = p.ctr||0;
      r.prev_cvr      = p.cvr||0;
      r.prev_cpc      = p.cpc||0;
      if(p.roas>0 && r.roas>0){
        r.old_roas_pct = Math.round(p.roas*100);
        r.roas_delta   = Math.round((r.roas-p.roas)/p.roas*1000)/10;
      }
    }
    // age_days / is_new 는 rtParseInsights에서 광고명 날짜 기준으로 이미 계산됨 (덮어쓰지 않음)
  });

  // ── 위닝 판정 ──
  rows.forEach(r=>{
    if(r.objective==='전환' && avgRoas>0){
      const wf = {
        roas: (r.roas_pct||0) > avgRoas, ctr: r.ctr > avgCtr,
        cvr:  r.cvr > avgCvr, cpc: r.cpc>0 && r.cpc<avgCpc,
        purchases: r.purchases > avgPur,
      };
      r.win_score = Object.values(wf).filter(Boolean).length;
      r.win_type = '전환'; r.win_flags = wf;
    } else if(['트래픽','콘조'].includes(r.objective)){
      r.win_score = r.ctr > avgCtr ? 1 : 0;
      r.win_type = 'tc'; r.win_flags = {ctr: r.ctr>avgCtr};
    }
  });

  // ── d7 신규 소재 ──
  const d7All  = rows.filter(r=>r.age_days!=null && r.age_days<=7 && (r.spend||0)>=30000);
  const d7Win  = d7All
    .filter(r=>(r.win_type==='전환'&&(r.win_score||0)>=3)||(r.win_type==='tc'&&(r.win_score||0)>=1))
    .sort((a,b)=>(b.win_score||0)-(a.win_score||0)||b.spend-a.spend);
  const d7WinSet = new Set(d7Win.map(r=>r.ad_id));
  const d7Lose = d7All.filter(r=>!d7WinSet.has(r.ad_id)).sort((a,b)=>b.spend-a.spend);

  // ── pie (목적별) ──
  const pg = {};
  rows.forEach(r=>{
    const g = ['콘조','트래픽'].includes(r.objective) ? '콘조/트래픽'
            : r.objective==='전환' ? '상시전환' : '파트너스';
    if(!pg[g]) pg[g]={spend:0,count:0,new_count:0};
    pg[g].spend+=r.spend||0; pg[g].count++;
    if(r.is_new) pg[g].new_count++;
  });

  // ── prev_summary: 지난주 summary를 경과일수로 환산 (볼륨만) ──
  const _ps = prevData ? (prevData.summary||{}) : {};
  const prev_summary = Object.assign({}, _ps, {
    spend:       Math.round((_ps.spend||0)*prevFactor),
    revenue:     Math.round((_ps.revenue||0)*prevFactor),
    purchases:   Math.round((_ps.purchases||0)*prevFactor),
    impressions: Math.round((_ps.impressions||0)*prevFactor),
    clicks:      Math.round((_ps.clicks||0)*prevFactor),
    // roas_pct, avg_*, active_ads 는 비율/카운트 → 환산 안함
  });
  const prev_label = prevW
    ? `${prevW.label} · 7일→${elapsedDays}일 환산`
    : '전주';

  // ── 리딩 소재 뱃지 계산 (meta_sync.py calc_leader_badges 동일) ──
  function rtTop7Keys(data){
    const cv = (data.all_ads||[]).filter(r=>r.objective==='전환' && (r.spend||0)>0);
    return new Set([...cv].sort((a,b)=>b.spend-a.spend).slice(0,7).map(r=>r.base_key));
  }
  const curTop7 = rtTop7Keys({all_ads: rows});
  const pastWeeks = weeks.filter(w=>w.id!=='RT-LIVE');
  const pastKeysets = [];
  for(const w of pastWeeks){
    let dat = cache[w.id];
    if(!dat){ try{ const r=await fetch('data/'+w.id+'.json'); if(r.ok){ dat=await r.json(); cache[w.id]=dat; } }catch(e){} }
    pastKeysets.push(dat ? rtTop7Keys(dat) : new Set());
  }
  const leaderBadges = {};
  curTop7.forEach(key=>{
    let streak = 1;
    for(const ks of pastKeysets){ if(ks.has(key)) streak++; else break; }
    const hasHistory = pastKeysets.some(ks=>ks.has(key));
    if(streak>=2)        leaderBadges[key] = {type:'streak', count:streak};
    else if(hasHistory)  leaderBadges[key] = {type:'comeback'};
    else                 leaderBadges[key] = {type:'new'};
  });

  // ── label: W26 (실시간) 형태 ──
  const monDate = new Date(start+'T00:00:00+09:00');
  const todDate = new Date(end+'T00:00:00+09:00');
  const rangeLabel = (monDate.getMonth()+1)+'/'+monDate.getDate()
                   +'~'+(todDate.getMonth()+1)+'/'+todDate.getDate();
  // weekId: RT-고정 (기존 JSON과 절대 충돌 없음)
  const weekId = 'RT-LIVE';
  const label  = rangeLabel;

  const json = {
    label, ref_date: end, is_realtime: true,
    summary: {
      spend: Math.round(tSpend), revenue: Math.round(tRev),
      roas_pct: tSpend>0 ? Math.round(tRev/tSpend*1000)/10 : 0,
      purchases: Math.round(rows.reduce((s,r)=>s+(r.purchases||0),0)),
      impressions: rows.reduce((s,r)=>s+(r.impressions||0),0),
      clicks: rows.reduce((s,r)=>s+(r.clicks||0),0),
      avg_ctr: avgCtr, avg_roas: avgRoas/100, active_ads: rows.length,
      winning_thresholds: {
        avg_roas: avgRoas/100, avg_roas_pct: avgRoas,
        avg_ctr: avgCtr, avg_cvr: avgCvr, avg_cpc: avgCpc,
        avg_purchases: avgPur, tc_avg_ctr: avgCtr,
      }
    },
    prev_summary, prev_label,
    pie: {groups: Object.entries(pg).map(([name,v])=>({name,...v}))},
    trends: {spend_up:[],rev_up:[],cpc_eff_up:[],conv_dn:[],cpc_eff_dn:[]},
    winning: rows.filter(r=>r.win_type==='전환'&&(r.win_score||0)>=3)
                 .sort((a,b)=>b.revenue-a.revenue).slice(0,14),
    d7_win: d7Win, d7_lose: d7Lose,
    all_ads: rows.sort((a,b)=>b.spend-a.spend),
    leader_badges: leaderBadges,
  };

  return {json, weekId, label};
}
// 실시간 주차 로드
async function loadRealtimeWeek(force=false){
  const tok = getRtToken();
  const statusEl = document.getElementById('rtLiveStatus');
  if(!tok){
    if(statusEl) statusEl.textContent = '🔑 토큰 필요';
    document.getElementById('rtOverlay').style.display='flex';
    return;
  }
  if(statusEl) statusEl.textContent = '🔄 실시간 수집 중...';

  // 캐시 확인
  if(!force){
    try{
      const cached = JSON.parse(localStorage.getItem(RT_CACHE_KEY)||'null');
      if(cached && cached.ver === RT_CACHE_VER && Date.now()-cached.ts < RT_TTL){
        applyRtWeek(cached.weekId, cached.json, cached.label);
        scheduleRtRefresh(cached.ts + RT_TTL - Date.now());
        return;
      }
    }catch(e){}
  }

  try{
    const {json, weekId, label} = await buildRtWeekJson();
    localStorage.setItem(RT_CACHE_KEY, JSON.stringify({json, weekId, label, ts: Date.now(), ver: RT_CACHE_VER}));
    applyRtWeek(weekId, json, label);
    scheduleRtRefresh(RT_TTL);
  }catch(e){
    console.error('실시간 로드 실패:', e);
    const statusEl = document.getElementById('rtLiveStatus');
    if(statusEl) statusEl.textContent = '⚠️ 로드 실패';
    // 로딩 탭에 에러 메시지 표시
    const loadingTab = weeks.find(w=>w.isLoading);
    if(loadingTab && curWeekId===loadingTab.id){
      document.getElementById('mainContent').innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:.75rem;color:var(--color-text-secondary)">'
        +'<div style="font-size:1.5rem">⚠️</div>'
        +'<div style="font-size:.85rem;font-weight:500">실시간 데이터 로드 실패</div>'
        +'<div style="font-size:.75rem;color:var(--color-text-tertiary)">'+e.message+'</div>'
        +'<button onclick="loadRealtimeWeek(true)" style="margin-top:.5rem;padding:6px 16px;border-radius:20px;border:1px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:.8rem">다시 시도</button>'
        +'</div>';
    }
    if(e.message&&(e.message.includes('token')||e.message.includes('Invalid')||e.message.includes('190'))){
      localStorage.removeItem(RT_TOKEN_KEY);
      document.getElementById('rtOverlay').style.display='flex';
    }
  }
}

function applyRtWeek(weekId, json, label){
  // 주입 토큰 없으면 토큰 변경 버튼 표시
  if(!RT_TOKEN_INJECTED || RT_TOKEN_INJECTED.startsWith('__')){
    const btn = document.getElementById('rtResetBtn');
    if(btn) btn.style.display = 'inline';
  }
  cache[weekId] = json;

  // 기존 실시간 탭 업데이트 (미리 추가된 탭의 isLoading 제거)
  const existing = weeks.find(w=>w.id===weekId || w.isLoading);
  if(existing){
    existing.id       = weekId;
    existing.label    = '🔴 이번 주 ('+label+')';
    existing.ref_date = json.ref_date;
    existing.isLoading= false;
  } else {
    weeks.unshift({id:weekId, label:'🔴 이번 주 ('+label+')', ref_date:json.ref_date});
  }

  // 실시간 탭으로 전환 & 렌더
  curWeekId  = weekId;
  curRefDate = json.ref_date;
  renderTabs();
  renderAll(json);

  // 상태 뱃지 업데이트
  const statusEl = document.getElementById('rtLiveStatus');
  if(statusEl) statusEl.textContent = '✅ 실시간 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 기준';
}

function scheduleRtRefresh(ms){
  if(rtRefreshTimer) clearTimeout(rtRefreshTimer);
  rtRefreshTimer = setTimeout(()=>loadRealtimeWeek(true), ms);
}

// 토큰 초기화 버튼
function resetRtToken(){
  localStorage.removeItem(RT_TOKEN_KEY);
  localStorage.removeItem(RT_CACHE_KEY);
  document.getElementById('rtOverlay').style.display='flex';
}
/* ══════════════════════════════════════════ */

loadWeeks();
